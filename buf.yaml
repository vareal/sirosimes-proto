version: v2
modules:
  - path: proto
    name: buf.build/vareal/sirosimes
lint:
  use:
    - STANDARD
    - COMMENTS
  except:
    - PACKAGE_VERSION_SUFFIX
    - COMMENT_FIELD
    - COMMENT_ENUM_VALUE
    - COMMENT_ONEOF
    - COMMENT_RPC
    - COMMENT_SERVICE
    # External gateway services intentionally re-use Internal message types.
    # This is by design: security boundary (separate service) not type boundary.
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
