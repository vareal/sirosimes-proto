version: v2
deps:
  - buf.build/googleapis/googleapis
modules:
  - path: proto
    name: buf.build/vareal/sirosimes
lint:
  use:
    - STANDARD
    - COMMENTS
  except:
    - PACKAGE_VERSION_SUFFIX
    - COMMENT_FIELD
    - COMMENT_ENUM_VALUE
    - COMMENT_ONEOF
    - COMMENT_RPC
    - COMMENT_SERVICE
    - COMMENT_MESSAGE
    - COMMENT_ENUM
  ignore_only:
    # External gateway services intentionally re-use Internal message types.
    # Scoped to external/ only — internal protos retain full RPC uniqueness check.
    RPC_REQUEST_RESPONSE_UNIQUE:
      - proto/sirosimes/mizugaki/external
      - proto/sirosimes/mizugaki/v1
breaking:
  use:
    - FILE
