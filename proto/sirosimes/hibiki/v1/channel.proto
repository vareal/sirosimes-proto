// マルチチャネル配信と配信状態管理を行う。

syntax = "proto3";

package sirosimes.hibiki.v1;

option go_package = "github.com/vareal/sirosimes-proto/gen/go/sirosimes/hibiki/v1;hibikiv1";

import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

enum ChannelType {
  CHANNEL_TYPE_UNSPECIFIED = 0;
  CHANNEL_TYPE_EMAIL = 1;
  CHANNEL_TYPE_SOCIAL_TWITTER = 2;
  CHANNEL_TYPE_SOCIAL_LINKEDIN = 3;
  CHANNEL_TYPE_SOCIAL_FACEBOOK = 4;
  CHANNEL_TYPE_SOCIAL_INSTAGRAM = 5;
  CHANNEL_TYPE_WEB = 6;
  CHANNEL_TYPE_VOICE = 7;
  CHANNEL_TYPE_SMS = 8;
  CHANNEL_TYPE_CUSTOM = 9;
}

message Channel {
  string id = 1;
  string name = 2;
  ChannelType type = 3;
  bool enabled = 4;
  // チャネル固有設定。
  map<string, string> config = 5;
  sirosimes.common.v1.ResourceMetadata metadata = 15;
}

message Delivery {
  string id = 1;
  string campaign_id = 2;
  string content_id = 3;
  string channel_id = 4;
  string lead_id = 5;
  string status = 6;
  string error_message = 7;
  sirosimes.common.v1.ResourceMetadata metadata = 15;
}

service ChannelService {
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc SendDelivery(SendDeliveryRequest) returns (SendDeliveryResponse);
  rpc ListDeliveries(ListDeliveriesRequest) returns (ListDeliveriesResponse);
}

message CreateChannelRequest { Channel channel = 1; }
message CreateChannelResponse { Channel channel = 1; }
message ListChannelsRequest { sirosimes.common.v1.PaginationRequest pagination = 1; }
message ListChannelsResponse {
  repeated Channel channels = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}
message SendDeliveryRequest { Delivery delivery = 1; }
message SendDeliveryResponse { Delivery delivery = 1; }
message ListDeliveriesRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string campaign_id = 2;
  string channel_id = 3;
}
message ListDeliveriesResponse {
  repeated Delivery deliveries = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}
