syntax = "proto3";

package sirosimes.mikura.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/pagination.proto";

// lifecycle.proto — 御蔵（Mikura）ライフサイクル管理。
//
// オブジェクトの保持期間、有効期限アクション（削除・アーカイブ・通知）、
// 期限切れオブジェクトの一括処理を提供する。
//
// Exposure: INTERNAL（全RPC）

// ExpiryAction defines what happens when an object reaches its expiry date.
enum ExpiryAction {
  EXPIRY_ACTION_UNSPECIFIED = 0;
  EXPIRY_ACTION_DELETE = 1;
  EXPIRY_ACTION_ARCHIVE = 2;
  EXPIRY_ACTION_NOTIFY = 3;
}

// ObjectLifecycle defines the retention and expiry policy for an object.
message ObjectLifecycle {
  // Unique identifier (UUID format).
  string id = 1;
  // Object this lifecycle rule applies to.
  string object_id = 2;
  // Number of days to retain the object.
  int32 retention_days = 3;
  // Action to take when the object expires.
  ExpiryAction expiry_action = 4;
  // Calculated expiry timestamp.
  google.protobuf.Timestamp expires_at = 5;
  // Whether the expiry action has been processed.
  bool is_processed = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// GetLifecycleRequest is the request for retrieving an object lifecycle.
message GetLifecycleRequest {
  string object_id = 1;
}

// GetLifecycleResponse is the response containing an object lifecycle.
message GetLifecycleResponse {
  ObjectLifecycle lifecycle = 1;
}

// SetLifecycleRequest is the request for setting an object lifecycle.
message SetLifecycleRequest {
  string object_id = 1;
  int32 retention_days = 2;
  ExpiryAction expiry_action = 3;
}

// SetLifecycleResponse is the response after setting a lifecycle.
message SetLifecycleResponse {
  ObjectLifecycle lifecycle = 1;
}

// ListExpiredRequest is the request for listing expired objects.
message ListExpiredRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  bool unprocessed_only = 2;
}

// ListExpiredResponse is the response for listing expired objects.
message ListExpiredResponse {
  repeated ObjectLifecycle lifecycles = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// ProcessExpiredRequest is the request for processing expired objects.
message ProcessExpiredRequest {
  // Maximum number of expired objects to process in this batch.
  int32 batch_size = 1;
}

// ProcessExpiredResponse is the response after processing expired objects.
message ProcessExpiredResponse {
  // Number of objects processed.
  int32 processed_count = 1;
  // Number of objects that failed processing.
  int32 failed_count = 2;
}

// LifecycleService manages object retention and expiry in Mikura.
// Exposure: INTERNAL — all RPCs are for internal use only.
service LifecycleService {
  rpc GetLifecycle(GetLifecycleRequest) returns (GetLifecycleResponse) {
    option (google.api.http) = {
      get: "/v1/objects/{object_id}/lifecycle"
    };
  }
  rpc SetLifecycle(SetLifecycleRequest) returns (SetLifecycleResponse) {
    option (google.api.http) = {
      put: "/v1/objects/{object_id}/lifecycle"
      body: "*"
    };
  }
  rpc ListExpired(ListExpiredRequest) returns (ListExpiredResponse) {
    option (google.api.http) = {
      get: "/v1/lifecycle/expired"
    };
  }
  rpc ProcessExpired(ProcessExpiredRequest) returns (ProcessExpiredResponse) {
    option (google.api.http) = {
      post: "/v1/lifecycle/process-expired"
      body: "*"
    };
  }
}
