syntax = "proto3";

package sirosimes.tamanoya.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

// assessment.proto — アセスメント期間・テスト・提出
//
// 玉の舎のアセスメント管理ドメイン。評価期間の設定、
// テストセッションの管理、回答の提出を扱う。
//
// 関連:
//   - user.proto: 受験者/管理者情報
//   - question.proto: 出題される問題
//   - evaluation.proto: 提出後のAI評価・承認WF
//   - skill.proto: アセスメント対象のスキル

// ---------------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------------

// PeriodStatus はアセスメント期間のステータス。
enum PeriodStatus {
  PERIOD_STATUS_UNSPECIFIED = 0;
  PERIOD_STATUS_NOT_STARTED = 1;
  PERIOD_STATUS_IN_PROGRESS = 2;
  PERIOD_STATUS_COMPLETED = 3;
}

// AssessmentCategory はアセスメントのカテゴリ。
enum AssessmentCategory {
  ASSESSMENT_CATEGORY_UNSPECIFIED = 0;
  ASSESSMENT_CATEGORY_TECHNICAL = 1;
  ASSESSMENT_CATEGORY_LOGICAL = 2;
  ASSESSMENT_CATEGORY_BUSINESS = 3;
  ASSESSMENT_CATEGORY_PRESENTATION = 4;
}

// AssessmentType はアセスメントの種別。
enum AssessmentType {
  ASSESSMENT_TYPE_UNSPECIFIED = 0;
  ASSESSMENT_TYPE_TECHNICAL_HARD = 1;
  ASSESSMENT_TYPE_TECHNICAL_SOFT = 2;
  ASSESSMENT_TYPE_LOGICAL_THINKING = 3;
  ASSESSMENT_TYPE_BUSINESS_SKILL = 4;
  ASSESSMENT_TYPE_MANAGEMENT_HARD = 5;
  ASSESSMENT_TYPE_SALES_HARD = 6;
  ASSESSMENT_TYPE_PRESENTATION_SKILL = 7;
}

// SubmissionStatus は提出物のステータス。
enum SubmissionStatus {
  SUBMISSION_STATUS_UNSPECIFIED = 0;
  SUBMISSION_STATUS_IN_PROGRESS = 1;
  SUBMISSION_STATUS_SUBMITTED = 2;
  SUBMISSION_STATUS_EVALUATING = 3;
  SUBMISSION_STATUS_EVALUATED = 4;
  SUBMISSION_STATUS_REVIEWED = 5;
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

// AssessmentPeriod はアセスメント期間を表す。
message AssessmentPeriod {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  // 期間コード（例: "2025-h1", "practice"）
  string code = 2;
  // 期間名（例: "2025年上期"）
  string name = 3;
  // 開始日
  string start_date = 4;
  // 終了日
  string end_date = 5;
  // 提出期限
  string deadline = 6;
  // ステータス
  PeriodStatus status = 7;
  // 練習モードを許可するか
  bool allow_practice = 8;
}

// AssessmentSubmission はアセスメント提出物。
message AssessmentSubmission {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  // セッションID
  string session_id = 2;
  // 受験者ID
  string user_id = 3;
  // アセスメント期間ID
  string period_id = 4;
  // カテゴリ
  AssessmentCategory category = 5;
  // アセスメント種別
  AssessmentType assessment_type = 6;
  // 受験者の部門
  string department = 7;
  // 受験者の等級
  string grade = 8;

  // --- 時間情報 ---
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp submitted_at = 10;
  int32 time_spent_seconds = 11;
  // 残り時間（自動保存用）
  int32 time_remaining_seconds = 12;
  // 現在の問題インデックス（0始まり）
  int32 current_question_index = 13;
  google.protobuf.Timestamp auto_saved_at = 14;

  // --- 状態 ---
  SubmissionStatus status = 15;

  // --- スコア ---
  double total_score = 16;
  double max_score = 17;
  double percentage_score = 18;
  // 評価ティア（S/A/B/C/D）
  string evaluation_tier = 19;

  // --- 評価詳細 ---
  google.protobuf.Struct evaluation_result = 20;
  string feedback = 21;
  bool is_demo = 22;

  // --- 回答一覧 ---
  repeated AssessmentAnswer answers = 23;
}

// AssessmentAnswer はアセスメントの個別回答。
message AssessmentAnswer {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string submission_id = 2;
  // 問題バンクID（DBの問題から出題時）
  string question_id = 3;
  // レガシー問題参照
  string question_ref = 4;
  // 問題タイプ
  string question_type = 5;
  string question_title = 6;

  // --- 回答内容 ---
  string answer_text = 7;
  string answer_code = 8;
  repeated string selected_options = 9;
  int32 time_spent_seconds = 10;

  // --- 評価 ---
  double score = 11;
  double max_score = 12;
  bool is_correct = 13;
  google.protobuf.Struct rubric_scores = 14;
  string feedback = 15;
}

// QuestionSettings はアセスメント種別ごとの出題設定。
message QuestionSettings {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  AssessmentType assessment_type = 2;
  // 対象グレード（空の場合は全グレード共通）
  string target_grade = 3;
  int32 required_count = 4;
  bool is_enabled = 5;
  string min_difficulty = 6;
  string max_difficulty = 7;
  int32 time_limit_minutes = 8;
}

// ---------------------------------------------------------------------------
// Request / Response
// ---------------------------------------------------------------------------

// --- Period ---

message GetAssessmentPeriodRequest {
  string id = 1;
}
message GetAssessmentPeriodResponse {
  AssessmentPeriod period = 1;
}

message ListAssessmentPeriodsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  PeriodStatus status = 2;
}
message ListAssessmentPeriodsResponse {
  repeated AssessmentPeriod periods = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message CreateAssessmentPeriodRequest {
  string code = 1;
  string name = 2;
  string start_date = 3;
  string end_date = 4;
  string deadline = 5;
  bool allow_practice = 6;
}
message CreateAssessmentPeriodResponse {
  AssessmentPeriod period = 1;
}

message UpdateAssessmentPeriodRequest {
  string id = 1;
  google.protobuf.FieldMask update_mask = 2;
  string name = 3;
  string start_date = 4;
  string end_date = 5;
  string deadline = 6;
  PeriodStatus status = 7;
  bool allow_practice = 8;
}
message UpdateAssessmentPeriodResponse {
  AssessmentPeriod period = 1;
}

// --- Submission ---

message GetSubmissionRequest {
  string id = 1;
}
message GetSubmissionResponse {
  AssessmentSubmission submission = 1;
}

message ListSubmissionsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string user_id = 2;
  string period_id = 3;
  AssessmentType assessment_type = 4;
  SubmissionStatus status = 5;
  string department = 6;
  string grade = 7;
}
message ListSubmissionsResponse {
  repeated AssessmentSubmission submissions = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message StartAssessmentRequest {
  string user_id = 1;
  string period_id = 2;
  AssessmentType assessment_type = 3;
}
message StartAssessmentResponse {
  AssessmentSubmission submission = 1;
}

message SubmitAssessmentRequest {
  string session_id = 1;
  repeated AnswerInput answers = 2;
}

message AnswerInput {
  string question_id = 1;
  string answer_text = 2;
  string answer_code = 3;
  repeated string selected_options = 4;
  int32 time_spent_seconds = 5;
}

message SubmitAssessmentResponse {
  AssessmentSubmission submission = 1;
}

message AutoSaveRequest {
  string session_id = 1;
  int32 current_question_index = 2;
  int32 time_remaining_seconds = 3;
  repeated AnswerInput answers = 4;
}
message AutoSaveResponse {
  google.protobuf.Timestamp saved_at = 1;
}

// --- Question Settings ---

message GetQuestionSettingsRequest {
  AssessmentType assessment_type = 1;
  string target_grade = 2;
}
message GetQuestionSettingsResponse {
  QuestionSettings settings = 1;
}

message ListQuestionSettingsRequest {
  AssessmentType assessment_type = 1;
}
message ListQuestionSettingsResponse {
  repeated QuestionSettings settings = 1;
}

message UpdateQuestionSettingsRequest {
  string id = 1;
  google.protobuf.FieldMask update_mask = 2;
  int32 required_count = 3;
  bool is_enabled = 4;
  string min_difficulty = 5;
  string max_difficulty = 6;
  int32 time_limit_minutes = 7;
}
message UpdateQuestionSettingsResponse {
  QuestionSettings settings = 1;
}

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

// AssessmentService はアセスメントの期間・セッション・提出を管理するサービス。
service AssessmentService {
  // --- 期間管理 ---
  rpc GetAssessmentPeriod(GetAssessmentPeriodRequest) returns (GetAssessmentPeriodResponse) {
    option (google.api.http) = {
      get: "/api/v1/assessment-periods/{id}"
    };
  }
  rpc ListAssessmentPeriods(ListAssessmentPeriodsRequest) returns (ListAssessmentPeriodsResponse) {
    option (google.api.http) = {
      get: "/api/v1/assessment-periods"
    };
  }
  rpc CreateAssessmentPeriod(CreateAssessmentPeriodRequest) returns (CreateAssessmentPeriodResponse) {
    option (google.api.http) = {
      post: "/api/v1/assessment-periods"
      body: "*"
    };
  }
  rpc UpdateAssessmentPeriod(UpdateAssessmentPeriodRequest) returns (UpdateAssessmentPeriodResponse) {
    option (google.api.http) = {
      patch: "/api/v1/assessment-periods/{id}"
      body: "*"
    };
  }

  // --- 提出管理 ---
  rpc GetSubmission(GetSubmissionRequest) returns (GetSubmissionResponse) {
    option (google.api.http) = {
      get: "/api/v1/submissions/{id}"
    };
  }
  rpc ListSubmissions(ListSubmissionsRequest) returns (ListSubmissionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/submissions"
    };
  }

  // アセスメント開始（セッション生成 + 問題出題）
  rpc StartAssessment(StartAssessmentRequest) returns (StartAssessmentResponse) {
    option (google.api.http) = {
      post: "/api/v1/assessments/start"
      body: "*"
    };
  }

  // アセスメント提出
  rpc SubmitAssessment(SubmitAssessmentRequest) returns (SubmitAssessmentResponse) {
    option (google.api.http) = {
      post: "/api/v1/assessments/submit"
      body: "*"
    };
  }

  // 自動保存
  rpc AutoSave(AutoSaveRequest) returns (AutoSaveResponse) {
    option (google.api.http) = {
      post: "/api/v1/assessments/auto-save"
      body: "*"
    };
  }

  // --- 出題設定 ---
  rpc GetQuestionSettings(GetQuestionSettingsRequest) returns (GetQuestionSettingsResponse) {
    option (google.api.http) = {
      get: "/api/v1/question-settings"
    };
  }
  rpc ListQuestionSettings(ListQuestionSettingsRequest) returns (ListQuestionSettingsResponse) {
    option (google.api.http) = {
      get: "/api/v1/question-settings/list"
    };
  }
  rpc UpdateQuestionSettings(UpdateQuestionSettingsRequest) returns (UpdateQuestionSettingsResponse) {
    option (google.api.http) = {
      patch: "/api/v1/question-settings/{id}"
      body: "*"
    };
  }
}
