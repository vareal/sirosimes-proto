syntax = "proto3";

package sirosimes.tamanoya.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/actor.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";
import "sirosimes/tamanoya/v1/skill.proto";

// learner.proto — 玉の舎（Tamanoya）学習者プロファイル・ロードマップ。
//
// 学習者のスキルプロファイル管理、学習ロードマップの作成・追跡を管理する。
//
// Exposure: INTERNAL（全RPC）

// LearnerSkill represents a skill held by a learner.
message LearnerSkill {
  string skill_id = 1;
  SkillLevel level = 2;
  bool verified = 3;
  google.protobuf.Timestamp earned_at = 4;
  google.protobuf.Timestamp verified_at = 5;
  string verified_by_id = 6;
}

// LearnerProfile represents a learner's skill profile.
message LearnerProfile {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string actor_id = 2;
  repeated LearnerSkill skills = 3;
  int32 total_training_hours = 4;
  int32 assessments_completed = 5;
  int32 assessments_passed = 6;
  google.protobuf.Timestamp last_activity_at = 7;
}

// LearnerProfileDetail bundles a profile with the actor reference.
message LearnerProfileDetail {
  LearnerProfile profile = 1;
  sirosimes.common.v1.ActorRef actor = 2;
}

// Milestone represents a target in a learning roadmap.
message Milestone {
  string id = 1;
  string skill_id = 2;
  SkillLevel target_level = 3;
  google.protobuf.Timestamp deadline = 4;
  bool completed = 5;
  google.protobuf.Timestamp completed_at = 6;
  int32 order = 7;
  repeated string training_content_ids = 8;
  string assessment_id = 9;
}

// Roadmap represents a personalized learning plan.
message Roadmap {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string learner_id = 2;
  string title = 3;
  string description = 4;
  repeated Milestone milestones = 5;
  int32 completion_percent = 6;
  google.protobuf.Timestamp target_date = 7;
  string created_by_id = 8;
}

// RoadmapDetail bundles a roadmap with the learner reference.
message RoadmapDetail {
  Roadmap roadmap = 1;
  sirosimes.common.v1.ActorRef learner = 2;
  sirosimes.common.v1.ActorRef created_by = 3;
}

// SkillRecommendation represents a suggested next skill to learn.
message SkillRecommendation {
  string skill_id = 1;
  string skill_name = 2;
  SkillLevel recommended_level = 3;
  string reason = 4;
  double relevance_score = 5;
}

// GetLearnerProfileRequest is the request for retrieving a learner profile.
message GetLearnerProfileRequest {
  string actor_id = 1;
}

// GetLearnerProfileResponse is the response containing a learner profile.
message GetLearnerProfileResponse {
  LearnerProfileDetail profile = 1;
}

// UpdateLearnerProfileRequest is the request for updating a learner profile.
message UpdateLearnerProfileRequest {
  string actor_id = 1;
  repeated LearnerSkill skills = 2;
}

// UpdateLearnerProfileResponse is the response after updating a learner profile.
message UpdateLearnerProfileResponse {
  LearnerProfileDetail profile = 1;
}

// ListLearnerProfilesRequest is the request for listing learner profiles.
message ListLearnerProfilesRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string skill_id = 2;
  SkillLevel min_level = 3;
  string search = 4;
}

// ListLearnerProfilesResponse is the response for listing learner profiles.
message ListLearnerProfilesResponse {
  repeated LearnerProfileDetail profiles = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// ListRoadmapsRequest is the request for listing roadmaps.
message ListRoadmapsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string learner_id = 2;
}

// ListRoadmapsResponse is the response for listing roadmaps.
message ListRoadmapsResponse {
  repeated RoadmapDetail roadmaps = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// GetRoadmapRequest is the request for retrieving a single roadmap.
message GetRoadmapRequest {
  string id = 1;
}

// GetRoadmapResponse is the response containing a single roadmap.
message GetRoadmapResponse {
  RoadmapDetail roadmap = 1;
}

// CreateRoadmapRequest is the request for creating a roadmap.
message CreateRoadmapRequest {
  string learner_id = 1;
  string title = 2;
  string description = 3;
  repeated Milestone milestones = 4;
  google.protobuf.Timestamp target_date = 5;
  string created_by_id = 6;
}

// CreateRoadmapResponse is the response after creating a roadmap.
message CreateRoadmapResponse {
  RoadmapDetail roadmap = 1;
}

// UpdateRoadmapRequest is the request for updating a roadmap.
message UpdateRoadmapRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  repeated Milestone milestones = 4;
  google.protobuf.Timestamp target_date = 5;
}

// UpdateRoadmapResponse is the response after updating a roadmap.
message UpdateRoadmapResponse {
  RoadmapDetail roadmap = 1;
}

// DeleteRoadmapRequest is the request for deleting a roadmap.
message DeleteRoadmapRequest {
  string id = 1;
}

// DeleteRoadmapResponse is the response after deleting a roadmap.
message DeleteRoadmapResponse {}

// GetRecommendationsRequest is the request for getting skill recommendations.
message GetRecommendationsRequest {
  string actor_id = 1;
  int32 limit = 2;
}

// GetRecommendationsResponse is the response containing skill recommendations.
message GetRecommendationsResponse {
  repeated SkillRecommendation recommendations = 1;
}

// LearnerService manages learner profiles and roadmaps.
// Exposure: INTERNAL — all RPCs are for internal use only.
service LearnerService {
  rpc GetLearnerProfile(GetLearnerProfileRequest) returns (GetLearnerProfileResponse) {
    option (google.api.http) = {
      get: "/v1/learners/{actor_id}"
    };
  }
  rpc UpdateLearnerProfile(UpdateLearnerProfileRequest) returns (UpdateLearnerProfileResponse) {
    option (google.api.http) = {
      patch: "/v1/learners/{actor_id}"
      body: "*"
    };
  }
  rpc ListLearnerProfiles(ListLearnerProfilesRequest) returns (ListLearnerProfilesResponse) {
    option (google.api.http) = {
      get: "/v1/learners"
    };
  }
  rpc ListRoadmaps(ListRoadmapsRequest) returns (ListRoadmapsResponse) {
    option (google.api.http) = {
      get: "/v1/roadmaps"
    };
  }
  rpc GetRoadmap(GetRoadmapRequest) returns (GetRoadmapResponse) {
    option (google.api.http) = {
      get: "/v1/roadmaps/{id}"
    };
  }
  rpc CreateRoadmap(CreateRoadmapRequest) returns (CreateRoadmapResponse) {
    option (google.api.http) = {
      post: "/v1/roadmaps"
      body: "*"
    };
  }
  rpc UpdateRoadmap(UpdateRoadmapRequest) returns (UpdateRoadmapResponse) {
    option (google.api.http) = {
      patch: "/v1/roadmaps/{id}"
      body: "*"
    };
  }
  rpc DeleteRoadmap(DeleteRoadmapRequest) returns (DeleteRoadmapResponse) {
    option (google.api.http) = {
      delete: "/v1/roadmaps/{id}"
    };
  }
  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse) {
    option (google.api.http) = {
      get: "/v1/learners/{actor_id}/recommendations"
    };
  }
}
