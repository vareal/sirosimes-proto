syntax = "proto3";

package sirosimes.kotodama.v1;

import "google/protobuf/timestamp.proto";

// model.proto — Model registry and health monitoring.

// ModelCapabilities defines what a model can do.
message ModelCapabilities {
  bool chat = 1;
  bool vision = 2;
  bool embeddings = 3;
  bool fine_tuning = 4;
}

// ModelStatus indicates the runtime state of a model.
enum ModelStatus {
  MODEL_STATUS_UNSPECIFIED = 0;
  MODEL_STATUS_READY = 1;
  MODEL_STATUS_LOADING = 2;
  MODEL_STATUS_UNLOADED = 3;
  MODEL_STATUS_ERROR = 4;
}

// Model represents a loaded or available language model.
message Model {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string owned_by = 4;
  ModelCapabilities capabilities = 5;
  int32 context_length = 6;
  string quantization = 7;
  string parameters = 8;
  string hardware = 9;
  ModelStatus status = 10;
}

// NodeHealth represents a hardware node in the cluster.
message NodeHealth {
  string node_id = 1;
  float memory_total_gb = 2;
  float memory_used_gb = 3;
  repeated string loaded_models = 4;
  string status = 5;
}

// ModelService provides model registry and health queries.
service ModelService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc GetModel(GetModelRequest) returns (GetModelResponse);
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
}

// ListModelsRequest lists all available models (no parameters needed).
message ListModelsRequest {}

// ListModelsResponse contains the list of available models.
message ListModelsResponse {
  string object = 1;
  repeated Model data = 2;
}

// GetModelRequest identifies the model to retrieve.
message GetModelRequest {
  string id = 1;
}

// GetModelResponse wraps the retrieved model.
message GetModelResponse {
  Model model = 1;
}

// GetHealthRequest retrieves overall Kotodama health (no parameters needed).
message GetHealthRequest {}

// GetHealthResponse wraps the health status.
message GetHealthResponse {
  string status = 1;
  int32 models_loaded = 2;
  int64 uptime_seconds = 3;
  repeated NodeHealth nodes = 4;
  google.protobuf.Timestamp checked_at = 5;
}
