syntax = "proto3";

package sirosimes.kotodama.v1;

import "google/protobuf/timestamp.proto";

// dataset.proto — Training dataset management for Kotodama Phase 1.

// DatasetStatus indicates the state of a dataset.
enum DatasetStatus {
  DATASET_STATUS_UNSPECIFIED = 0;
  DATASET_STATUS_UPLOADED = 1;
  DATASET_STATUS_VALIDATING = 2;
  DATASET_STATUS_VALIDATED = 3;
  DATASET_STATUS_ERROR = 4;
}

// DatasetSample represents a single training sample.
message DatasetSample {
  string instruction = 1;
  string input = 2;
  string output = 3;
}

// ValidationResult contains dataset quality metrics.
message ValidationResult {
  int32 total_records = 1;
  int32 valid_records = 2;
  int32 invalid_records = 3;
  int32 duplicate_count = 4;
  int32 empty_field_count = 5;
  repeated string format_errors = 6;
  int32 train_count = 7;
  int32 validation_count = 8;
}

// Dataset represents a training dataset.
message Dataset {
  string id = 1;
  string name = 2;
  string description = 3;
  string format = 4;  // "jsonl"
  int32 record_count = 5;
  int64 file_size_bytes = 6;
  DatasetStatus status = 7;
  ValidationResult validation = 8;
  repeated string tags = 9;
  string category = 10;
  string created_by = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

// DatasetService provides training dataset management.
service DatasetService {
  rpc UploadDataset(UploadDatasetRequest) returns (UploadDatasetResponse);
  rpc ListDatasets(ListDatasetsRequest) returns (ListDatasetsResponse);
  rpc GetDataset(GetDatasetRequest) returns (GetDatasetResponse);
  rpc PreviewDataset(PreviewDatasetRequest) returns (PreviewDatasetResponse);
  rpc ValidateDataset(ValidateDatasetRequest) returns (ValidateDatasetResponse);
  rpc DeleteDataset(DeleteDatasetRequest) returns (DeleteDatasetResponse);
}

message UploadDatasetRequest {
  string name = 1;
  string description = 2;
  bytes content = 3;  // JSONL file content
  repeated string tags = 4;
  string category = 5;
}

message UploadDatasetResponse {
  Dataset dataset = 1;
}

message ListDatasetsRequest {
  int32 page = 1;
  int32 per_page = 2;
  string category = 3;
  string tag = 4;
}

message ListDatasetsResponse {
  repeated Dataset datasets = 1;
  int32 total = 2;
}

message GetDatasetRequest {
  string id = 1;
}

message GetDatasetResponse {
  Dataset dataset = 1;
}

message PreviewDatasetRequest {
  string id = 1;
  int32 limit = 2; // Number of samples to preview (default 10)
}

message PreviewDatasetResponse {
  repeated DatasetSample samples = 1;
  int32 total_records = 2;
}

message ValidateDatasetRequest {
  string id = 1;
}

message ValidateDatasetResponse {
  ValidationResult result = 1;
}

message DeleteDatasetRequest {
  string id = 1;
}

message DeleteDatasetResponse {}
