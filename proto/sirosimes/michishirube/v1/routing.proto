syntax = "proto3";

package sirosimes.michishirube.v1;

import "google/api/annotations.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

// routing.proto — 道標（Michishirube）リクエストルーティング。
//
// モデルマッピング、フォールバックルール、負荷分散戦略によるリクエストルーティングを管理する。
//
// Exposure: INTERNAL（全RPC）

// RoutingStrategy classifies the load balancing strategy.
enum RoutingStrategy {
  ROUTING_STRATEGY_UNSPECIFIED = 0;
  ROUTING_STRATEGY_PRIORITY = 1;
  ROUTING_STRATEGY_ROUND_ROBIN = 2;
  ROUTING_STRATEGY_WEIGHTED = 3;
  ROUTING_STRATEGY_COST_OPTIMIZED = 4;
  ROUTING_STRATEGY_LATENCY_OPTIMIZED = 5;
}

// ModelMapping maps a model alias to a provider and its provider-specific model name.
message ModelMapping {
  string model_alias = 1;
  string provider_id = 2;
  string provider_model = 3;
  int32 priority = 4;
  int32 weight = 5;
  bool enabled = 6;
}

// FallbackRule defines a fallback provider chain for a model alias.
message FallbackRule {
  string model_alias = 1;
  repeated string fallback_provider_ids = 2;
  int32 max_retries = 3;
  int32 retry_delay_ms = 4;
}

// RoutingRule represents a named routing configuration.
message RoutingRule {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string name = 2;
  string description = 3;
  RoutingStrategy strategy = 4;
  repeated ModelMapping mappings = 5;
  repeated FallbackRule fallbacks = 6;
  bool enabled = 7;
}

// RouteResolution represents the resolved provider for a request.
message RouteResolution {
  string provider_id = 1;
  string provider_model = 2;
  string model_alias = 3;
  RoutingStrategy strategy_used = 4;
  bool fallback_used = 5;
  int32 attempt_number = 6;
  float estimated_latency_ms = 7;
}

// ListRoutingRulesRequest is the request for listing routing rules.
message ListRoutingRulesRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  RoutingStrategy strategy = 2;
}

// ListRoutingRulesResponse is the response for listing routing rules.
message ListRoutingRulesResponse {
  repeated RoutingRule rules = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// GetRoutingRuleRequest is the request for retrieving a single routing rule.
message GetRoutingRuleRequest {
  string id = 1;
}

// GetRoutingRuleResponse is the response containing a single routing rule.
message GetRoutingRuleResponse {
  RoutingRule rule = 1;
}

// CreateRoutingRuleRequest is the request for creating a routing rule.
message CreateRoutingRuleRequest {
  string name = 1;
  string description = 2;
  RoutingStrategy strategy = 3;
  repeated ModelMapping mappings = 4;
  repeated FallbackRule fallbacks = 5;
  bool enabled = 6;
}

// CreateRoutingRuleResponse is the response after creating a routing rule.
message CreateRoutingRuleResponse {
  RoutingRule rule = 1;
}

// UpdateRoutingRuleRequest is the request for updating a routing rule.
message UpdateRoutingRuleRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  RoutingStrategy strategy = 4;
  repeated ModelMapping mappings = 5;
  repeated FallbackRule fallbacks = 6;
  bool enabled = 7;
}

// UpdateRoutingRuleResponse is the response after updating a routing rule.
message UpdateRoutingRuleResponse {
  RoutingRule rule = 1;
}

// DeleteRoutingRuleRequest is the request for deleting a routing rule.
message DeleteRoutingRuleRequest {
  string id = 1;
}

// DeleteRoutingRuleResponse is the response after deleting a routing rule.
message DeleteRoutingRuleResponse {}

// ResolveRouteRequest is the request for resolving the best provider for a model.
message ResolveRouteRequest {
  string model_alias = 1;
  string agent_id = 2;
  string priority = 3;
}

// ResolveRouteResponse is the response containing the resolved route.
message ResolveRouteResponse {
  RouteResolution resolution = 1;
}

// RoutingService manages request routing rules and route resolution.
// Exposure: INTERNAL — all RPCs are for internal use only.
service RoutingService {
  rpc ListRoutingRules(ListRoutingRulesRequest) returns (ListRoutingRulesResponse) {
    option (google.api.http) = {
      get: "/v1/routing-rules"
    };
  }
  rpc GetRoutingRule(GetRoutingRuleRequest) returns (GetRoutingRuleResponse) {
    option (google.api.http) = {
      get: "/v1/routing-rules/{id}"
    };
  }
  rpc CreateRoutingRule(CreateRoutingRuleRequest) returns (CreateRoutingRuleResponse) {
    option (google.api.http) = {
      post: "/v1/routing-rules"
      body: "*"
    };
  }
  rpc UpdateRoutingRule(UpdateRoutingRuleRequest) returns (UpdateRoutingRuleResponse) {
    option (google.api.http) = {
      patch: "/v1/routing-rules/{id}"
      body: "*"
    };
  }
  rpc DeleteRoutingRule(DeleteRoutingRuleRequest) returns (DeleteRoutingRuleResponse) {
    option (google.api.http) = {
      delete: "/v1/routing-rules/{id}"
    };
  }
  rpc ResolveRoute(ResolveRouteRequest) returns (ResolveRouteResponse) {
    option (google.api.http) = {
      post: "/v1/routing-rules:resolve"
      body: "*"
    };
  }
}
