syntax = "proto3";
package sirosimes.common.v1;
option go_package = "github.com/vareal/sirosimes-proto/gen/go/common/v1;commonv1";

message UUID {
  string value = 1;
}

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message Pagination {
  int32 page = 1;
  int32 per_page = 2;
  int32 total = 3;
  int32 total_pages = 4;
}

message SortOrder {
  string field = 1;
  bool descending = 2;
}
