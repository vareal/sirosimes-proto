syntax = "proto3";

package sirosimes.common.v1;

import "google/protobuf/timestamp.proto";

// SecurityLevel classifies data sensitivity per CISO directive.
enum SecurityLevel {
  SECURITY_LEVEL_UNSPECIFIED = 0;
  SECURITY_LEVEL_PUBLIC = 1;
  SECURITY_LEVEL_INTERNAL = 2;
  SECURITY_LEVEL_CONFIDENTIAL = 3;
  SECURITY_LEVEL_RESTRICTED = 4;
}

// ResourceMetadata provides standard metadata for all Sirosimes resources.
message ResourceMetadata {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.Timestamp deleted_at = 4;
  string created_by = 5;
  string updated_by = 6;
  int64 version = 7;
  map<string, string> labels = 8;
  map<string, string> annotations = 9;
}
