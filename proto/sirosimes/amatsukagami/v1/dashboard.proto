syntax = "proto3";

package sirosimes.amatsukagami.v1;

import "sirosimes/common/v1/metadata.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/pagination.proto";
import "sirosimes/amatsukagami/v1/metric.proto";

// dashboard.proto — 統合ダッシュボード構成定義。
//
// Single Pane of Glass ダッシュボードの構成を定義する。
// CXOプリセット（CEO/COO/CTO/CFO等のロール別デフォルトビュー）、
// カスタムダッシュボード、パネル構成、データソース設定を含む。
//
// テンプレート変数:
//   DashboardVariable によりダッシュボードにパラメータ化されたフィルタを追加可能。
//   例: $domain で監視領域を切り替え、$service でサービス名フィルタ。
//   パネルクエリの filters / label_filters で "${variable_name}" として参照。
//
// レイアウト:
//   24カラムグリッドシステムを採用。各パネルは grid_x/y/width/height で配置。
//   DashboardRow でパネルを論理的にグループ化し、折りたたみ可能。

// PanelType はダッシュボードパネルの表示種別。
enum PanelType {
  PANEL_TYPE_UNSPECIFIED = 0;
  // 時系列折れ線グラフ。
  PANEL_TYPE_TIME_SERIES = 1;
  // ゲージ（単一値メーター）。
  PANEL_TYPE_GAUGE = 2;
  // 統計カード（現在値 + 変動率）。
  PANEL_TYPE_STAT = 3;
  // テーブル。
  PANEL_TYPE_TABLE = 4;
  // ヒートマップ。
  PANEL_TYPE_HEATMAP = 5;
  // 円グラフ。
  PANEL_TYPE_PIE = 6;
  // 棒グラフ。
  PANEL_TYPE_BAR = 7;
  // ステータスマップ（サービス正常/異常一覧）。
  PANEL_TYPE_STATUS_MAP = 8;
  // アラートリスト。
  PANEL_TYPE_ALERT_LIST = 9;
  // ログビューア。
  PANEL_TYPE_LOG = 10;
  // マークダウンテキスト。
  PANEL_TYPE_TEXT = 11;
  // トポロジーマップ（ネットワーク・サービス依存関係図）。
  PANEL_TYPE_TOPOLOGY = 12;
  // フローダイアグラム（Sankey図: データフロー・コスト配分可視化）。
  PANEL_TYPE_FLOW = 13;
}

// DashboardPreset はCXOロール別プリセットダッシュボード種別。
enum DashboardPreset {
  DASHBOARD_PRESET_UNSPECIFIED = 0;
  // CEO — 全領域サマリー + KPI + 財務ハイライト。
  DASHBOARD_PRESET_CEO = 1;
  // COO — AI社員稼働 + プロダクト + タスク進捗。
  DASHBOARD_PRESET_COO = 2;
  // CTO — インフラ + プロダクト + セキュリティ。
  DASHBOARD_PRESET_CTO = 3;
  // CFO — 財務 + コスト + 予実。
  DASHBOARD_PRESET_CFO = 4;
  // CISO — セキュリティ + 脅威 + コンプライアンス。
  DASHBOARD_PRESET_CISO = 5;
  // CHRO — 人間社員 + 勤怠 + エンゲージメント。
  DASHBOARD_PRESET_CHRO = 6;
  // 全体俯瞰（8領域統合ビュー）。
  DASHBOARD_PRESET_OVERVIEW = 7;
  // カスタム。
  DASHBOARD_PRESET_CUSTOM = 8;
}

// VariableType はダッシュボード変数の種別。
enum VariableType {
  VARIABLE_TYPE_UNSPECIFIED = 0;
  // 固定値リストから選択。
  VARIABLE_TYPE_CUSTOM = 1;
  // メトリクスラベル値から動的取得。
  VARIABLE_TYPE_LABEL_VALUES = 2;
  // メトリクス名一覧から動的取得。
  VARIABLE_TYPE_METRIC_NAMES = 3;
  // 監視領域選択。
  VARIABLE_TYPE_DOMAIN = 4;
  // テキスト入力。
  VARIABLE_TYPE_TEXT = 5;
  // 時間間隔（例: 5m, 1h, 1d）。
  VARIABLE_TYPE_INTERVAL = 6;
}

// DashboardVariable はダッシュボードのテンプレート変数を定義する。
// パネルクエリのフィルタで "${name}" として参照可能。
message DashboardVariable {
  // 変数名（パネルクエリで ${name} として参照）。
  string name = 1;
  // 表示ラベル。
  string label = 2;
  // 変数種別。
  VariableType type = 3;
  // デフォルト値。
  string default_value = 4;
  // 選択肢（VARIABLE_TYPE_CUSTOM時）。
  repeated string options = 5;
  // ラベルキー（VARIABLE_TYPE_LABEL_VALUES時: このラベルの値を取得）。
  string label_key = 6;
  // メトリクス名（VARIABLE_TYPE_LABEL_VALUES時: このメトリクスのラベル値を取得）。
  string source_metric = 7;
  // 複数選択可。
  bool multi_select = 8;
  // 「全て」オプション追加。
  bool include_all = 9;
}

// PanelQuery はパネルのデータ取得クエリを定義する。
message PanelQuery {
  // メトリクス名。
  string metric_name = 1;
  // 監視領域。
  MonitoringDomain domain = 2;
  // 集約方法。
  AggregationMethod aggregation = 3;
  // グループ化ラベル。
  repeated string group_by = 4;
  // フィルタ条件。テンプレート変数は "${variable_name}" で参照可能。
  map<string, string> filters = 5;
  // クエリ表示名（凡例）。テンプレート変数使用可。
  string legend = 6;
}

// PanelThreshold はパネルの閾値表示設定。
message PanelThreshold {
  // 閾値。
  double value = 1;
  // 色（CSS色指定: "#FF0000", "red" 等）。
  string color = 2;
  // ラベル。
  string label = 3;
}

// Panel はダッシュボード上の個別パネルを定義する。
message Panel {
  // パネルID（ダッシュボード内で一意）。
  string id = 1;
  // タイトル。テンプレート変数使用可。
  string title = 2;
  // パネル種別。
  PanelType type = 3;
  // データクエリ（複数可: オーバーレイ表示）。
  repeated PanelQuery queries = 4;
  // グリッド配置: X座標（0-based, 24カラムグリッド）。
  int32 grid_x = 5;
  // グリッド配置: Y座標。
  int32 grid_y = 6;
  // グリッド幅（1-24）。
  int32 grid_width = 7;
  // グリッド高さ。
  int32 grid_height = 8;
  // 閾値設定。
  repeated PanelThreshold thresholds = 9;
  // テキスト内容（PANEL_TYPE_TEXT用）。マークダウン形式。
  string text_content = 10;
  // 表示単位。
  string unit = 11;
  // 小数桁数。
  int32 decimals = 12;
  // パネル説明（ツールチップ表示用）。
  string description = 13;
}

// DashboardRow はパネルを含む行グループ。
message DashboardRow {
  // 行タイトル。
  string title = 1;
  // 折りたたみ可能か。
  bool collapsible = 2;
  // デフォルトで折りたたみか。
  bool collapsed = 3;
  // 含まれるパネル。
  repeated Panel panels = 4;
}

// Dashboard はダッシュボード構成を表す。
message Dashboard {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  // ダッシュボード名。
  string name = 2;
  // 説明。
  string description = 3;
  // プリセット種別。
  DashboardPreset preset = 4;
  // 行構成。
  repeated DashboardRow rows = 5;
  // 自動リフレッシュ間隔（秒。0で無効）。
  int32 auto_refresh_seconds = 6;
  // デフォルト時間範囲（時間。例: 24 = 過去24時間）。
  int32 default_time_range_hours = 7;
  // 共有（true: 全員閲覧可, false: 作成者のみ）。
  bool shared = 8;
  // お気に入りユーザーID一覧。
  repeated string favorited_by = 9;
  // タグ。
  repeated string tags = 10;
  // テンプレート変数（パネルクエリのパラメータ化に使用）。
  repeated DashboardVariable variables = 11;
}

// DashboardService はダッシュボード管理サービス。
service DashboardService {
  // ダッシュボードを一覧する。
  rpc ListDashboards(ListDashboardsRequest) returns (ListDashboardsResponse);
  // ダッシュボードを取得する。
  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardResponse);
  // ダッシュボードを作成する。
  rpc CreateDashboard(CreateDashboardRequest) returns (CreateDashboardResponse);
  // ダッシュボードを更新する。
  rpc UpdateDashboard(UpdateDashboardRequest) returns (UpdateDashboardResponse);
  // ダッシュボードを削除する。
  rpc DeleteDashboard(DeleteDashboardRequest) returns (DeleteDashboardResponse);
  // プリセットダッシュボードを取得する（CXOロール指定）。
  rpc GetPresetDashboard(GetPresetDashboardRequest) returns (GetPresetDashboardResponse);
  // ダッシュボードを複製する。
  rpc CloneDashboard(CloneDashboardRequest) returns (CloneDashboardResponse);
}

message ListDashboardsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  DashboardPreset preset_filter = 2;
  bool shared_only = 3;
  string search = 4;
  repeated string tags = 5;
}

message ListDashboardsResponse {
  repeated Dashboard dashboards = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message GetDashboardRequest {
  string id = 1;
}

message GetDashboardResponse {
  Dashboard dashboard = 1;
}

message CreateDashboardRequest {
  string name = 1;
  string description = 2;
  DashboardPreset preset = 3;
  repeated DashboardRow rows = 4;
  int32 auto_refresh_seconds = 5;
  int32 default_time_range_hours = 6;
  bool shared = 7;
  repeated string tags = 8;
  // テンプレート変数。
  repeated DashboardVariable variables = 9;
}

message CreateDashboardResponse {
  Dashboard dashboard = 1;
}

message UpdateDashboardRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated DashboardRow rows = 4;
  int32 auto_refresh_seconds = 5;
  int32 default_time_range_hours = 6;
  bool shared = 7;
  repeated string tags = 8;
  // テンプレート変数。
  repeated DashboardVariable variables = 9;
}

message UpdateDashboardResponse {
  Dashboard dashboard = 1;
}

message DeleteDashboardRequest {
  string id = 1;
}

message DeleteDashboardResponse {}

message GetPresetDashboardRequest {
  DashboardPreset preset = 1;
}

message GetPresetDashboardResponse {
  Dashboard dashboard = 1;
}

message CloneDashboardRequest {
  string source_id = 1;
  string new_name = 2;
}

message CloneDashboardResponse {
  Dashboard dashboard = 1;
}

// ===== WebSocket Session Security (CISO Review 2026-03-12) =====

// WebSocketAuthRequest is sent by the client during WebSocket handshake.
message WebSocketAuthRequest {
  // OAuth2 Bearer token from Mizugaki SSO (JWT Ed25519).
  string access_token = 1;
  // CSRF token for origin validation.
  string csrf_token = 2;
  // Client origin URL for server-side origin check.
  string origin = 3;
}

// WebSocketAuthResponse is returned by the server after handshake validation.
message WebSocketAuthResponse {
  // Whether authentication was successful.
  bool authenticated = 1;
  // Session ID for this WebSocket connection.
  string session_id = 2;
  // When the token expires (client must re-authenticate before this).
  google.protobuf.Timestamp token_expires_at = 3;
  // Error message if authentication failed.
  string error_message = 4;
}

// WebSocketReauthRequest is sent by the client to refresh the session token.
// Must be sent before token_expires_at (default: 30 minutes).
message WebSocketReauthRequest {
  // Current session ID.
  string session_id = 1;
  // New refreshed access token from Mizugaki SSO.
  string new_access_token = 2;
}

// WebSocketSessionEvent tracks session lifecycle for audit logging.
message WebSocketSessionEvent {
  // Unique session ID.
  string session_id = 1;
  // Event type.
  WebSocketSessionEventType event_type = 2;
  // When the event occurred.
  google.protobuf.Timestamp timestamp = 3;
  // Actor who owns this session.
  string actor_id = 4;
  // Client IP address.
  string ip_address = 5;
  // Reason for disconnect/invalidation (if applicable).
  string reason = 6;
}

// WebSocketSessionEventType classifies session lifecycle events.
enum WebSocketSessionEventType {
  WS_SESSION_EVENT_UNSPECIFIED = 0;
  // Client connected and authenticated.
  WS_SESSION_EVENT_CONNECTED = 1;
  // Client re-authenticated (token refresh).
  WS_SESSION_EVENT_REAUTHENTICATED = 2;
  // Normal client disconnect.
  WS_SESSION_EVENT_DISCONNECTED = 3;
  // Server-side forced disconnect (abnormal — token expired, policy violation).
  WS_SESSION_EVENT_INVALIDATED = 4;
  // Abnormal disconnect detected — token immediately invalidated (CISO requirement).
  WS_SESSION_EVENT_ABNORMAL_DISCONNECT = 5;
}

// DashboardRBACPolicy defines role-based access control for API endpoints.
// Each CXO role has an explicit list of accessible endpoints and data scopes.
message DashboardRBACPolicy {
  // Role identifier (maps to DashboardPreset or custom role).
  string role = 1;
  // List of API endpoints this role can access.
  repeated RBACEndpointAccess endpoints = 2;
  // Data scope restrictions.
  RBACDataScope data_scope = 3;
}

// RBACEndpointAccess defines access to a specific API endpoint.
message RBACEndpointAccess {
  // API endpoint path pattern (e.g., "/api/v1/metrics/*").
  string endpoint_pattern = 1;
  // Allowed HTTP methods.
  repeated string methods = 2;
  // Whether field-level access policy (field_access.proto) applies.
  bool field_access_policy_enabled = 3;
}

// RBACDataScope defines what data a role can access.
message RBACDataScope {
  // Which monitoring domains are visible to this role.
  repeated string allowed_domains = 1;
  // Whether human employee individual data is accessible.
  bool human_individual_access = 2;
  // Whether AI employee cost details are accessible.
  bool ai_cost_detail_access = 3;
  // Maximum data retention depth (e.g., "30d", "90d", "365d").
  string max_retention_access = 4;
}
