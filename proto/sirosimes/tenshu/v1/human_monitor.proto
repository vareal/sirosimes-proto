syntax = "proto3";

package sirosimes.tenshu.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

// human_monitor.proto — 人間社員監視定義。
//
// 性無説（Sei-Mu-Setsu）に基づく人間社員の包括的監視。
// 人間の本性は善でも悪でもなく、環境・状況により不正・勘違い・怠慢を起こしうる。
// ブラックボックスなし — 全行動の可視化を通じて、厳しさと愛情を持って導く。
//
// 監視カテゴリ:
// 1. 勤怠・稼働時間  2. 業務量・タスク遂行  3. デバイス利用
// 4. アクセスログ  5. 不正・怠慢検知  6. KPI・パフォーマンス
// 7. 過負荷・ウェルビーイング  8. 経費利用  9. 是正フロー  10. 表彰

// AttendanceStatus は勤怠状態。
enum AttendanceStatus {
  ATTENDANCE_STATUS_UNSPECIFIED = 0;
  ATTENDANCE_STATUS_WORKING = 1;
  ATTENDANCE_STATUS_BREAK = 2;
  ATTENDANCE_STATUS_MEETING = 3;
  ATTENDANCE_STATUS_ABSENT = 4;
  ATTENDANCE_STATUS_LEAVE = 5;
  ATTENDANCE_STATUS_HOLIDAY = 6;
  ATTENDANCE_STATUS_OVERTIME = 7;
}

// AnomalyType は人間社員の異常検知種別。
enum AnomalyType {
  ANOMALY_TYPE_UNSPECIFIED = 0;
  // 業務時間外の異常アクセス。
  ANOMALY_TYPE_OFF_HOURS_ACCESS = 1;
  // 大量データダウンロード。
  ANOMALY_TYPE_BULK_DOWNLOAD = 2;
  // 未承認デバイスの使用。
  ANOMALY_TYPE_UNAUTHORIZED_DEVICE = 3;
  // 長時間の無活動。
  ANOMALY_TYPE_PROLONGED_INACTIVITY = 4;
  // 異常な経費パターン。
  ANOMALY_TYPE_EXPENSE_ANOMALY = 5;
  // 権限外リソースへのアクセス試行。
  ANOMALY_TYPE_UNAUTHORIZED_ACCESS = 6;
  // タスク遅延（期限超過）。
  ANOMALY_TYPE_TASK_OVERDUE = 7;
  // 過剰残業（ウェルビーイングリスク）。
  ANOMALY_TYPE_EXCESSIVE_OVERTIME = 8;
  // コミュニケーション断絶（報告なし期間超過）。
  ANOMALY_TYPE_COMMUNICATION_GAP = 9;
  // KPI著しい低下。
  ANOMALY_TYPE_KPI_DEGRADATION = 10;
}

// CorrectiveActionType は是正措置の種別。
enum CorrectiveActionType {
  CORRECTIVE_ACTION_TYPE_UNSPECIFIED = 0;
  // 自動リマインダー送信。
  CORRECTIVE_ACTION_TYPE_REMINDER = 1;
  // マネージャーへの通知。
  CORRECTIVE_ACTION_TYPE_MANAGER_ALERT = 2;
  // 1on1ミーティング提案。
  CORRECTIVE_ACTION_TYPE_MEETING_SUGGESTION = 3;
  // 業務量調整提案。
  CORRECTIVE_ACTION_TYPE_WORKLOAD_ADJUSTMENT = 4;
  // 公式警告。
  CORRECTIVE_ACTION_TYPE_FORMAL_WARNING = 5;
  // 表彰・褒賞。
  CORRECTIVE_ACTION_TYPE_RECOGNITION = 6;
}

// CorrectiveActionStatus は是正措置のステータス。
enum CorrectiveActionStatus {
  CORRECTIVE_ACTION_STATUS_UNSPECIFIED = 0;
  CORRECTIVE_ACTION_STATUS_PROPOSED = 1;
  CORRECTIVE_ACTION_STATUS_APPROVED = 2;
  CORRECTIVE_ACTION_STATUS_IN_PROGRESS = 3;
  CORRECTIVE_ACTION_STATUS_COMPLETED = 4;
  CORRECTIVE_ACTION_STATUS_CANCELLED = 5;
}

// AttendanceRecord は勤怠レコード。
message AttendanceRecord {
  // 社員ID（司employee_id）。
  string employee_id = 1;
  // 日付。
  google.protobuf.Timestamp date = 2;
  // 出勤時刻。
  google.protobuf.Timestamp clock_in = 3;
  // 退勤時刻。
  google.protobuf.Timestamp clock_out = 4;
  // 実労働時間。
  google.protobuf.Duration work_duration = 5;
  // 休憩時間。
  google.protobuf.Duration break_duration = 6;
  // 残業時間。
  google.protobuf.Duration overtime_duration = 7;
  // 勤怠状態。
  AttendanceStatus status = 8;
  // データソース（打刻システム/カレンダー/推定）。
  string source = 9;
}

// DeviceActivity はデバイス利用記録。
message DeviceActivity {
  // 社員ID。
  string employee_id = 1;
  // デバイスID。
  string device_id = 2;
  // デバイス種別（laptop/mobile/tablet）。
  string device_type = 3;
  // アクティビティ種別（login/logout/app_usage/file_access）。
  string activity_type = 4;
  // タイムスタンプ。
  google.protobuf.Timestamp timestamp = 5;
  // 詳細（アプリ名、ファイルパス等）。
  map<string, string> details = 6;
  // リスクスコア（0.0-1.0）。
  float risk_score = 7;
}

// EmployeeAnomaly は検知された異常。
message EmployeeAnomaly {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  // 社員ID。
  string employee_id = 2;
  // 異常種別。
  AnomalyType anomaly_type = 3;
  // 検知時刻。
  google.protobuf.Timestamp detected_at = 4;
  // 深刻度（0.0-1.0）。
  float severity_score = 5;
  // 説明。
  string description = 6;
  // エビデンス。
  repeated string evidence = 7;
  // 対応済みか。
  bool addressed = 8;
  // 対応者。
  string addressed_by = 9;
  // 対応時刻。
  google.protobuf.Timestamp addressed_at = 10;
  // 是正措置ID。
  string corrective_action_id = 11;
}

// EmployeePerformance は社員パフォーマンスサマリー。
message EmployeePerformance {
  // 社員ID。
  string employee_id = 1;
  // 期間開始。
  google.protobuf.Timestamp period_start = 2;
  // 期間終了。
  google.protobuf.Timestamp period_end = 3;
  // タスク完了数。
  int32 tasks_completed = 4;
  // タスク期限内完了率。
  float on_time_completion_rate = 5;
  // 平均タスク完了時間。
  google.protobuf.Duration avg_task_duration = 6;
  // 出勤率。
  float attendance_rate = 7;
  // 平均残業時間（日）。
  google.protobuf.Duration avg_daily_overtime = 8;
  // 異常検知件数。
  int32 anomaly_count = 9;
  // ウェルビーイングスコア（0.0-1.0）。
  float wellbeing_score = 10;
  // エンゲージメントスコア（0.0-1.0）。
  float engagement_score = 11;
  // KPIスコア（カスタムKPI集約）。
  map<string, double> kpi_scores = 12;
}

// CorrectiveAction は是正措置レコード。
message CorrectiveAction {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  // 社員ID。
  string employee_id = 2;
  // 措置種別。
  CorrectiveActionType type = 3;
  // ステータス。
  CorrectiveActionStatus status = 4;
  // トリガーとなった異常ID。
  string anomaly_id = 5;
  // 措置内容。
  string description = 6;
  // 承認者（HITL）。
  string approved_by = 7;
  // 承認時刻。
  google.protobuf.Timestamp approved_at = 8;
  // 完了時刻。
  google.protobuf.Timestamp completed_at = 9;
  // 結果メモ。
  string outcome = 10;
}

// HumanMonitorService は人間社員監視サービス。
service HumanMonitorService {
  // 勤怠レコードを送信する。
  rpc IngestAttendance(IngestAttendanceRequest) returns (IngestAttendanceResponse);
  // 勤怠レコードを照会する。
  rpc QueryAttendance(QueryAttendanceRequest) returns (QueryAttendanceResponse);
  // デバイスアクティビティを送信する。
  rpc IngestDeviceActivity(IngestDeviceActivityRequest) returns (IngestDeviceActivityResponse);
  // デバイスアクティビティを照会する。
  rpc QueryDeviceActivity(QueryDeviceActivityRequest) returns (QueryDeviceActivityResponse);
  // 異常を一覧する。
  rpc ListAnomalies(ListAnomaliesRequest) returns (ListAnomaliesResponse);
  // 異常を取得する。
  rpc GetAnomaly(GetAnomalyRequest) returns (GetAnomalyResponse);
  // 異常に対応済みマークする。
  rpc AddressAnomaly(AddressAnomalyRequest) returns (AddressAnomalyResponse);
  // パフォーマンスサマリーを取得する。
  rpc GetEmployeePerformance(GetEmployeePerformanceRequest) returns (GetEmployeePerformanceResponse);
  // パフォーマンスサマリーを一覧する。
  rpc ListEmployeePerformances(ListEmployeePerformancesRequest) returns (ListEmployeePerformancesResponse);
  // 是正措置を作成する。
  rpc CreateCorrectiveAction(CreateCorrectiveActionRequest) returns (CreateCorrectiveActionResponse);
  // 是正措置を一覧する。
  rpc ListCorrectiveActions(ListCorrectiveActionsRequest) returns (ListCorrectiveActionsResponse);
  // 是正措置を承認する。
  rpc ApproveCorrectiveAction(ApproveCorrectiveActionRequest) returns (ApproveCorrectiveActionResponse);
  // 是正措置を完了する。
  rpc CompleteCorrectiveAction(CompleteCorrectiveActionRequest) returns (CompleteCorrectiveActionResponse);
}

message IngestAttendanceRequest {
  repeated AttendanceRecord records = 1;
}

message IngestAttendanceResponse {
  int32 accepted_count = 1;
}

message QueryAttendanceRequest {
  string employee_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  sirosimes.common.v1.PaginationRequest pagination = 4;
}

message QueryAttendanceResponse {
  repeated AttendanceRecord records = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message IngestDeviceActivityRequest {
  repeated DeviceActivity activities = 1;
}

message IngestDeviceActivityResponse {
  int32 accepted_count = 1;
}

message QueryDeviceActivityRequest {
  string employee_id = 1;
  string device_id = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  float min_risk_score = 5;
  sirosimes.common.v1.PaginationRequest pagination = 6;
}

message QueryDeviceActivityResponse {
  repeated DeviceActivity activities = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message ListAnomaliesRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string employee_id = 2;
  AnomalyType type_filter = 3;
  bool unaddressed_only = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
}

message ListAnomaliesResponse {
  repeated EmployeeAnomaly anomalies = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message GetAnomalyRequest {
  string id = 1;
}

message GetAnomalyResponse {
  EmployeeAnomaly anomaly = 1;
}

message AddressAnomalyRequest {
  string id = 1;
  string addressed_by = 2;
  string comment = 3;
  string corrective_action_id = 4;
}

message AddressAnomalyResponse {
  EmployeeAnomaly anomaly = 1;
}

message GetEmployeePerformanceRequest {
  string employee_id = 1;
  google.protobuf.Timestamp period_start = 2;
  google.protobuf.Timestamp period_end = 3;
}

message GetEmployeePerformanceResponse {
  EmployeePerformance performance = 1;
}

message ListEmployeePerformancesRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  google.protobuf.Timestamp period_start = 2;
  google.protobuf.Timestamp period_end = 3;
  string team_filter = 4;
}

message ListEmployeePerformancesResponse {
  repeated EmployeePerformance performances = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message CreateCorrectiveActionRequest {
  string employee_id = 1;
  CorrectiveActionType type = 2;
  string anomaly_id = 3;
  string description = 4;
}

message CreateCorrectiveActionResponse {
  CorrectiveAction action = 1;
}

message ListCorrectiveActionsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string employee_id = 2;
  CorrectiveActionStatus status_filter = 3;
}

message ListCorrectiveActionsResponse {
  repeated CorrectiveAction actions = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message ApproveCorrectiveActionRequest {
  string id = 1;
  string approved_by = 2;
}

message ApproveCorrectiveActionResponse {
  CorrectiveAction action = 1;
}

message CompleteCorrectiveActionRequest {
  string id = 1;
  string outcome = 2;
}

message CompleteCorrectiveActionResponse {
  CorrectiveAction action = 1;
}
