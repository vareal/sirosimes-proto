syntax = "proto3";

package sirosimes.kaji.v1;

import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

// build.proto — 鍛冶（Kaji）ビルド実行・アーティファクト管理。
//
// ビルドの実行追跡、アーティファクト管理、キャンセル操作を管理する。
//
// Exposure: INTERNAL（全RPC）

// BuildStatus represents the lifecycle state of a build.
enum BuildStatus {
  BUILD_STATUS_UNSPECIFIED = 0;
  BUILD_STATUS_QUEUED = 1;
  BUILD_STATUS_RUNNING = 2;
  BUILD_STATUS_SUCCESS = 3;
  BUILD_STATUS_FAILURE = 4;
  BUILD_STATUS_CANCELLED = 5;
  BUILD_STATUS_TIMEOUT = 6;
}

// StageResult represents the outcome of a single stage execution.
message StageResult {
  string stage_name = 1;
  BuildStatus status = 2;
  google.protobuf.Timestamp started_at = 3;
  google.protobuf.Timestamp finished_at = 4;
  google.protobuf.Duration duration = 5;
  string log_url = 6;
  string error = 7;
  int32 exit_code = 8;
}

// Artifact represents a build output artifact.
message Artifact {
  string id = 1;
  string name = 2;
  string path = 3;
  string url = 4;
  int64 size_bytes = 5;
  string checksum_sha256 = 6;
  string mime_type = 7;
  google.protobuf.Timestamp created_at = 8;
}

// Build represents a single pipeline execution.
message Build {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string pipeline_id = 2;
  string commit_sha = 3;
  string branch = 4;
  string commit_message = 5;
  BuildStatus status = 6;
  repeated StageResult stage_results = 7;
  repeated Artifact artifacts = 8;
  string triggered_by_id = 9;
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp finished_at = 11;
  google.protobuf.Duration duration = 12;
  map<string, string> variables = 13;
  string error = 14;
}

// ListBuildsRequest is the request for listing builds.
message ListBuildsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string pipeline_id = 2;
  BuildStatus status = 3;
  string branch = 4;
}

// ListBuildsResponse is the response for listing builds.
message ListBuildsResponse {
  repeated Build builds = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// GetBuildRequest is the request for retrieving a single build.
message GetBuildRequest {
  string id = 1;
}

// GetBuildResponse is the response containing a single build.
message GetBuildResponse {
  Build build = 1;
}

// CancelBuildRequest is the request for cancelling a running build.
message CancelBuildRequest {
  string id = 1;
  string reason = 2;
}

// CancelBuildResponse is the response after cancelling a build.
message CancelBuildResponse {
  Build build = 1;
}

// RetryBuildRequest is the request for retrying a failed build.
message RetryBuildRequest {
  string id = 1;
}

// RetryBuildResponse is the response after retrying a build.
message RetryBuildResponse {
  Build build = 1;
}

// ListArtifactsRequest is the request for listing build artifacts.
message ListArtifactsRequest {
  string build_id = 1;
  sirosimes.common.v1.PaginationRequest pagination = 2;
}

// ListArtifactsResponse is the response for listing build artifacts.
message ListArtifactsResponse {
  repeated Artifact artifacts = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// GetBuildLogsRequest is the request for retrieving build logs.
message GetBuildLogsRequest {
  string build_id = 1;
  string stage_name = 2;
}

// GetBuildLogsResponse is the response containing build logs.
message GetBuildLogsResponse {
  string content = 1;
  string log_url = 2;
}

// StreamBuildLogsRequest configures real-time build log streaming.
message StreamBuildLogsRequest {
  string build_id = 1;
  string stage_name = 2;
}

// StreamBuildLogsResponse wraps a single log line.
message StreamBuildLogsResponse {
  string line = 1;
  google.protobuf.Timestamp timestamp = 2;
  string stage_name = 3;
}

// BuildService manages build execution and artifacts.
// Exposure: INTERNAL — all RPCs are for internal use only.
service BuildService {
  rpc ListBuilds(ListBuildsRequest) returns (ListBuildsResponse) {
    option (google.api.http) = {
      get: "/v1/builds"
    };
  }
  rpc GetBuild(GetBuildRequest) returns (GetBuildResponse) {
    option (google.api.http) = {
      get: "/v1/builds/{id}"
    };
  }
  rpc CancelBuild(CancelBuildRequest) returns (CancelBuildResponse) {
    option (google.api.http) = {
      post: "/v1/builds/{id}/cancel"
      body: "*"
    };
  }
  rpc RetryBuild(RetryBuildRequest) returns (RetryBuildResponse) {
    option (google.api.http) = {
      post: "/v1/builds/{id}/retry"
      body: "*"
    };
  }
  rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse) {
    option (google.api.http) = {
      get: "/v1/builds/{build_id}/artifacts"
    };
  }
  rpc GetBuildLogs(GetBuildLogsRequest) returns (GetBuildLogsResponse) {
    option (google.api.http) = {
      get: "/v1/builds/{build_id}/logs"
    };
  }
  rpc StreamBuildLogs(StreamBuildLogsRequest) returns (stream StreamBuildLogsResponse);
}
