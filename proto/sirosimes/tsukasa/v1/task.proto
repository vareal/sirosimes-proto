syntax = "proto3";

package sirosimes.tsukasa.v1;

import "sirosimes/common/v1/metadata.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/actor.proto";
import "sirosimes/common/v1/pagination.proto";

// task.proto — 司（Tsukasa）タスク管理サービス。
//
// プロジェクト内のタスクのCRUD、コメント、承認を管理する。
//
// Exposure: INTERNAL（全RPC）

// TaskStatus represents the workflow state of a task.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_TODO = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_REVIEW = 3;
  TASK_STATUS_DONE = 4;
  TASK_STATUS_CANCELLED = 5;
}

// TaskPriority indicates the urgency level of a task.
enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW = 1;
  TASK_PRIORITY_MEDIUM = 2;
  TASK_PRIORITY_HIGH = 3;
  TASK_PRIORITY_URGENT = 4;
}

// ApprovalAction represents the outcome of a task review.
enum ApprovalAction {
  APPROVAL_ACTION_UNSPECIFIED = 0;
  APPROVAL_ACTION_APPROVED = 1;
  APPROVAL_ACTION_REJECTED = 2;
  APPROVAL_ACTION_REQUESTED_CHANGES = 3;
}

// Task represents a unit of work within a project.
message Task {
  // [Phase 2a dual-write] Prefer metadata.id for new code.
  string id = 1;
  string title = 2;
  string description = 3;
  string task_type = 4;
  TaskStatus status = 5;
  TaskPriority priority = 6;
  string assignee_id = 7;
  string reporter_id = 8;
  string project_id = 9;
  string parent_task_id = 10;
  string source_type = 11;
  google.protobuf.Timestamp due_date = 12;
  google.protobuf.Timestamp started_at = 13;
  google.protobuf.Timestamp completed_at = 14;
  double estimated_hours = 15;
  double actual_hours = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
  // [Phase 2a] Standard resource metadata. Default security_level: INTERNAL.
  sirosimes.common.v1.ResourceMetadata metadata = 19;
}

// TaskDetail bundles a task with resolved actor references.
message TaskDetail {
  Task task = 1;
  sirosimes.common.v1.ActorRef assignee = 2;
  sirosimes.common.v1.ActorRef reporter = 3;
}

// TaskComment represents a comment on a task.
message TaskComment {
  // [Phase 2a dual-write] Prefer metadata.id for new code.
  string id = 1;
  string task_id = 2;
  string author_id = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// TaskCommentDetail bundles a comment with the author reference.
message TaskCommentDetail {
  TaskComment comment = 1;
  sirosimes.common.v1.ActorRef author = 2;
}

// TaskApproval records an approval decision on a task.
message TaskApproval {
  // [Phase 2a dual-write] Prefer metadata.id for new code.
  string id = 1;
  string task_id = 2;
  ApprovalAction action = 3;
  string actor_id = 4;
  string comment = 5;
  google.protobuf.Timestamp created_at = 6;
}

// CreateTaskRequest is the request for creating a new task.
message CreateTaskRequest {
  string title = 1;
  string description = 2;
  string task_type = 3;
  TaskPriority priority = 4;
  string assignee_id = 5;
  string reporter_id = 6;
  string project_id = 7;
  string parent_task_id = 8;
  string source_type = 9;
  google.protobuf.Timestamp due_date = 10;
  double estimated_hours = 11;
}

// CreateTaskResponse is the response after creating a task.
message CreateTaskResponse {
  TaskDetail task = 1;
}

// ListTasksRequest is the request for listing tasks with filters.
// Uses cursor-based pagination for real-time task feeds.
message ListTasksRequest {
  sirosimes.common.v1.PageToken page_token = 1;
  TaskStatus status = 2;
  TaskPriority priority = 3;
  string assignee_id = 4;
  string project_id = 5;
  string parent_task_id = 6;
  string search = 7;
}

// ListTasksResponse is the response for listing tasks.
message ListTasksResponse {
  repeated TaskDetail tasks = 1;
  sirosimes.common.v1.PageTokenResponse page_info = 2;
}

// GetTaskRequest is the request for retrieving a single task.
message GetTaskRequest {
  // [Phase 2a dual-write] Prefer metadata.id for new code.
  string id = 1;
}

// GetTaskResponse is the response containing a single task.
message GetTaskResponse {
  TaskDetail task = 1;
  repeated TaskApproval approvals = 2;
}

// UpdateTaskRequest is the request for updating an existing task.
message UpdateTaskRequest {
  // [Phase 2a dual-write] Prefer metadata.id for new code.
  string id = 1;
  string title = 2;
  string description = 3;
  TaskStatus status = 4;
  TaskPriority priority = 5;
  string assignee_id = 6;
  google.protobuf.Timestamp due_date = 7;
  double estimated_hours = 8;
  double actual_hours = 9;
  // Fields to update. If empty, all non-empty fields are updated.
  google.protobuf.FieldMask update_mask = 10;
}

// UpdateTaskResponse is the response after updating a task.
message UpdateTaskResponse {
  TaskDetail task = 1;
}

// ListCommentsRequest is the request for listing task comments.
// Uses cursor-based pagination for real-time comment streams.
message ListCommentsRequest {
  string task_id = 1;
  sirosimes.common.v1.PageToken page_token = 2;
}

// ListCommentsResponse is the response for listing task comments.
message ListCommentsResponse {
  repeated TaskCommentDetail comments = 1;
  sirosimes.common.v1.PageTokenResponse page_info = 2;
}

// CreateCommentRequest is the request for creating a task comment.
message CreateCommentRequest {
  string task_id = 1;
  string author_id = 2;
  string content = 3;
}

// CreateCommentResponse is the response after creating a task comment.
message CreateCommentResponse {
  TaskCommentDetail comment = 1;
}

// ApproveTaskRequest is the request for approving a task.
message ApproveTaskRequest {
  string task_id = 1;
  string actor_id = 2;
  string comment = 3;
}

// ApproveTaskResponse is the response after approving a task.
message ApproveTaskResponse {
  TaskApproval approval = 1;
}

// RejectTaskRequest is the request for rejecting a task.
message RejectTaskRequest {
  string task_id = 1;
  string actor_id = 2;
  string comment = 3;
}

// RejectTaskResponse is the response after rejecting a task.
message RejectTaskResponse {
  TaskApproval approval = 1;
}

// TaskService provides task management operations.
// Exposure: INTERNAL — all RPCs are for internal use only.
service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
  rpc ApproveTask(ApproveTaskRequest) returns (ApproveTaskResponse);
  rpc RejectTask(RejectTaskRequest) returns (RejectTaskResponse);
}
