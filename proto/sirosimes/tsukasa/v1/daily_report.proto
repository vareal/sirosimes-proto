syntax = "proto3";

package sirosimes.tsukasa.v1;

import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/actor.proto";
import "sirosimes/common/v1/pagination.proto";

// ReportType classifies how a daily report was generated.
enum ReportType {
  REPORT_TYPE_UNSPECIFIED = 0;
  REPORT_TYPE_AUTO = 1;
  REPORT_TYPE_MANUAL = 2;
}

// ReportStatus represents the review lifecycle of a daily report.
enum ReportStatus {
  REPORT_STATUS_UNSPECIFIED = 0;
  REPORT_STATUS_DRAFT = 1;
  REPORT_STATUS_SUBMITTED = 2;
  REPORT_STATUS_REVIEWED = 3;
}

// DailyReport represents a daily work report submitted by an employee.
message DailyReport {
  string id = 1;
  string employee_id = 2;
  google.protobuf.Timestamp report_date = 3;
  ReportType report_type = 4;
  string content = 5;
  string summary = 6;
  string next_plan = 7;
  ReportStatus status = 8;
  string reviewer_id = 9;
  google.protobuf.Timestamp reviewed_at = 10;
  string review_comment = 11;
  string reflection = 12;
  string emotions = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

// DailyReportDetail bundles a report with resolved actor references.
message DailyReportDetail {
  DailyReport report = 1;
  sirosimes.common.v1.ActorRef employee = 2;
  sirosimes.common.v1.ActorRef reviewer = 3;
}

// DailyReportTemplate defines a reusable template for daily reports.
message DailyReportTemplate {
  string id = 1;
  string name = 2;
  string template_content = 3;
  bool is_active = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// ListReportsRequest is the request for listing daily reports.
message ListReportsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string employee_id = 2;
  ReportStatus status = 3;
  google.protobuf.Timestamp from_date = 4;
  google.protobuf.Timestamp to_date = 5;
}

// ListReportsResponse is the response for listing daily reports.
message ListReportsResponse {
  repeated DailyReportDetail reports = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// CreateReportRequest is the request for creating a new daily report.
message CreateReportRequest {
  string employee_id = 1;
  google.protobuf.Timestamp report_date = 2;
  ReportType report_type = 3;
  string content = 4;
  string summary = 5;
  string next_plan = 6;
  string reflection = 7;
  string emotions = 8;
}

// CreateReportResponse is the response after creating a daily report.
message CreateReportResponse {
  DailyReportDetail report = 1;
}

// ListTemplatesRequest is the request for listing report templates.
message ListTemplatesRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
}

// ListTemplatesResponse is the response for listing report templates.
message ListTemplatesResponse {
  repeated DailyReportTemplate templates = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// GetActiveTemplateRequest is the request for retrieving the active template.
message GetActiveTemplateRequest {}

// GetActiveTemplateResponse is the response containing the active template.
message GetActiveTemplateResponse {
  DailyReportTemplate template = 1;
}

// CreateTemplateRequest is the request for creating a new report template.
message CreateTemplateRequest {
  string name = 1;
  string template_content = 2;
  bool is_active = 3;
}

// CreateTemplateResponse is the response after creating a report template.
message CreateTemplateResponse {
  DailyReportTemplate template = 1;
}

// UpdateTemplateRequest is the request for updating an existing report template.
message UpdateTemplateRequest {
  string id = 1;
  string name = 2;
  string template_content = 3;
  bool is_active = 4;
}

// UpdateTemplateResponse is the response after updating a report template.
message UpdateTemplateResponse {
  DailyReportTemplate template = 1;
}

// DailyReportService provides daily report management operations.
service DailyReportService {
  rpc ListReports(ListReportsRequest) returns (ListReportsResponse);
  rpc CreateReport(CreateReportRequest) returns (CreateReportResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc GetActiveTemplate(GetActiveTemplateRequest) returns (GetActiveTemplateResponse);
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);
}
