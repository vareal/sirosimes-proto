syntax = "proto3";

package sirosimes.mizugaki.v1;

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/actor.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

// identity.proto — 瑞垣（Mizugaki）ユーザー・アイデンティティ管理。
//
// 瑞垣 SSO に登録されたユーザーアイデンティティの CRUD と検索を提供する。
//
// Exposure: INTERNAL（全RPC — フロントエンドはBFF経由でアクセス）
//
// 関連型:
//   - Actor/ActorRef (common/v1/actor.proto): アイデンティティは Actor に紐づく。
//   - SecurityLevel (common/v1/metadata.proto): PII を含むため RESTRICTED レベル。
//   - ResourceMetadata (common/v1/metadata.proto): 標準メタデータを埋め込む。

// IdentityStatus はアイデンティティの状態を表す。
enum IdentityStatus {
  IDENTITY_STATUS_UNSPECIFIED = 0;
  IDENTITY_STATUS_ACTIVE = 1;
  IDENTITY_STATUS_INACTIVE = 2;
  IDENTITY_STATUS_SUSPENDED = 3;
  IDENTITY_STATUS_PENDING_VERIFICATION = 4;
}

// MfaMethod は多要素認証の方法を分類する。
enum MfaMethod {
  MFA_METHOD_UNSPECIFIED = 0;
  // TOTP（時間ベースのワンタイムパスワード）。SIMスワップリスクなし。
  MFA_METHOD_TOTP = 1;
  // WebAuthn / FIDO2 セキュリティキー。最高セキュリティ。
  MFA_METHOD_WEBAUTHN = 2;
  // SMS は意図的に非サポート（SIMスワップリスク排除）。
}

// PasswordPolicy はパスワードポリシーを定義する。
// Proto SSoT としてポリシーの型を定義し、実装の一貫性を保証する。
message PasswordPolicy {
  // パスワード最小文字数（推奨: 12以上）。
  int32 min_length = 1;
  // 大文字を含む必要があるか。
  bool require_uppercase = 2;
  // 小文字を含む必要があるか。
  bool require_lowercase = 3;
  // 数字を含む必要があるか。
  bool require_digit = 4;
  // 特殊文字を含む必要があるか。
  bool require_special_char = 5;
  // パスワード最大有効期間（日）。0 = 無期限。
  int32 max_age_days = 6;
  // パスワード履歴の保持数（過去N回と同じパスワードを禁止）。
  int32 history_count = 7;
}

// Identity は瑞垣 SSO に登録されたユーザーアイデンティティを表す。
message Identity {
  // リソースメタデータ（ID、タイムスタンプ、バージョン、セキュリティレベル）。
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string username = 2;
  // SecurityLevel: RESTRICTED — PII。
  string email = 3;
  string display_name = 4;
  string name_kana = 5;
  sirosimes.common.v1.ActorType actor_type = 6;
  IdentityStatus status = 7;
  bool email_verified = 8;
  bool mfa_enabled = 9;
  repeated MfaMethod mfa_methods = 10;
  string avatar_url = 11;
  string organization_id = 12;
  repeated string role_ids = 13;
  google.protobuf.Timestamp last_login_at = 14;
  google.protobuf.Timestamp password_changed_at = 15;
}

// CreateIdentityRequest はアイデンティティ作成リクエストを表す。
message CreateIdentityRequest {
  string username = 1;
  string email = 2;
  string display_name = 3;
  string name_kana = 4;
  // 初期パスワード（RESTRICTED — トランスポートのみ、保存しない）。
  string password = 5;
  sirosimes.common.v1.ActorType actor_type = 6;
  string organization_id = 7;
  repeated string role_ids = 8;
}

// CreateIdentityResponse はアイデンティティ作成レスポンスを表す。
message CreateIdentityResponse {
  Identity identity = 1;
}

// GetIdentityRequest はアイデンティティ取得リクエストを表す。
message GetIdentityRequest {
  string id = 1;
}

// GetIdentityResponse はアイデンティティ取得レスポンスを表す。
message GetIdentityResponse {
  Identity identity = 1;
}

// UpdateIdentityRequest はアイデンティティ更新リクエストを表す。
message UpdateIdentityRequest {
  string id = 1;
  string display_name = 2;
  string name_kana = 3;
  string email = 4;
  string avatar_url = 5;
  string organization_id = 6;
  repeated string role_ids = 7;
  IdentityStatus status = 8;
  // Fields to update. If empty, all non-empty fields are updated.
  google.protobuf.FieldMask update_mask = 9;
}

// UpdateIdentityResponse はアイデンティティ更新レスポンスを表す。
message UpdateIdentityResponse {
  Identity identity = 1;
}

// DeleteIdentityRequest はアイデンティティ削除リクエストを表す。
message DeleteIdentityRequest {
  string id = 1;
}

// DeleteIdentityResponse はアイデンティティ削除レスポンスを表す（ソフトデリート）。
message DeleteIdentityResponse {}

// ListIdentitiesRequest はアイデンティティ一覧取得リクエストを表す。
message ListIdentitiesRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  IdentityStatus status = 2;
  sirosimes.common.v1.ActorType actor_type = 3;
  string organization_id = 4;
  string search = 5;
}

// ListIdentitiesResponse はアイデンティティ一覧取得レスポンスを表す。
message ListIdentitiesResponse {
  repeated Identity identities = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// ChangePasswordRequest はパスワード変更リクエストを表す。
// パスワード変更は特権操作であり、MFA有効ユーザーは再確認が必須。
message ChangePasswordRequest {
  string id = 1;
  // 現在のパスワード（本人による変更時は必須）。
  string current_password = 2;
  // 新しいパスワード（RESTRICTED — トランスポートのみ）。
  string new_password = 3;
  // MFA検証コード（TOTP 6桁コードまたはWebAuthnアサーション）。
  // MFA有効ユーザーは必須。MFA未設定ユーザーは空で可。
  string mfa_verification_code = 4;
}

// ChangePasswordResponse はパスワード変更レスポンスを表す。
message ChangePasswordResponse {}

// IdentityService はアイデンティティ管理操作を提供する。
// Exposure: INTERNAL — フロントエンドはBFF経由でアクセスする。
service IdentityService {
  rpc CreateIdentity(CreateIdentityRequest) returns (CreateIdentityResponse);
  rpc GetIdentity(GetIdentityRequest) returns (GetIdentityResponse);
  rpc UpdateIdentity(UpdateIdentityRequest) returns (UpdateIdentityResponse);
  rpc DeleteIdentity(DeleteIdentityRequest) returns (DeleteIdentityResponse);
  rpc ListIdentities(ListIdentitiesRequest) returns (ListIdentitiesResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
}
