syntax = "proto3";

package sirosimes.mizugaki.v1;

import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/actor.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/mizugaki/v1/api_key.proto";

// auth.proto — 瑞垣（Mizugaki）認証サービス定義。
//
// SSO認証の中核であるログイン・ログアウト・トークン検証・リフレッシュを提供する。
// 認証成功時は mizugaki_token Cookie を発行し、Ed25519 (EdDSA) で署名された
// JWT アクセストークンとリフレッシュトークンを返却する。
//
// ⚠️ トークン露出方針（CISO指令 A-1）:
//   外部クライアントには BFF/Gateway が opaque session ID に変換して返却する。
//   JWT 構造（ヘッダー、ペイロード、署名）は Internal API 間通信でのみ使用し、
//   外部には一切露出しない。JWE暗号化は将来的なオプションとして検討する。
//
// Exposure:
//   Login, Logout       → EXTERNAL（BFF/Gateway経由）
//   VerifyToken          → INTERNAL（サービス間認証のみ）
//   RefreshToken         → EXTERNAL（BFF/Gateway経由、opaque化）
//   ListSessions         → INTERNAL
//   RevokeSession        → INTERNAL
//   CreateApiKey         → INTERNAL（管理者操作）
//   RevokeApiKey         → INTERNAL（管理者操作）
//
// 関連型:
//   - Actor/ActorRef (common/v1/actor.proto): 認証されたユーザーを識別する。
//   - SecurityLevel (common/v1/metadata.proto): 認証情報は RESTRICTED レベル。

// AuthMethod は認証に使用された方法を分類する。
enum AuthMethod {
  AUTH_METHOD_UNSPECIFIED = 0;
  AUTH_METHOD_PASSWORD = 1;
  AUTH_METHOD_OAUTH2 = 2;
  AUTH_METHOD_API_KEY = 3;
  AUTH_METHOD_SSO_COOKIE = 4;
  AUTH_METHOD_REFRESH_TOKEN = 5;
}

// SessionStatus はセッションの状態を表す。
enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_ACTIVE = 1;
  SESSION_STATUS_EXPIRED = 2;
  SESSION_STATUS_REVOKED = 3;
}

// AuthSession はユーザーの認証セッションを表す。
message AuthSession {
  string id = 1;
  string user_id = 2;
  sirosimes.common.v1.ActorRef actor_ref = 3;
  SessionStatus status = 4;
  AuthMethod auth_method = 5;
  // アクセストークン（JWT）。SecurityLevel: RESTRICTED。
  // ⚠️ External APIではopaque session IDに変換して返却すること。
  // JWT構造はInternal API間通信でのみ使用する。
  string access_token = 6;
  // リフレッシュトークン。SecurityLevel: RESTRICTED。
  // ⚠️ 同上：外部にはopaque形式で返却。
  string refresh_token = 7;
  google.protobuf.Timestamp access_token_expires_at = 8;
  google.protobuf.Timestamp refresh_token_expires_at = 9;
  // クライアントIPアドレス。SecurityLevel: CONFIDENTIAL — 監査用。
  string ip_address = 10;
  // クライアントのユーザーエージェント。SecurityLevel: CONFIDENTIAL — 監査用。
  string user_agent = 11;
  sirosimes.common.v1.SecurityLevel security_level = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

// ApiKeyConfig は API キーの設定とライフサイクルを管理する。
// API キーは長期有効トークンであるため、有効期限・スコープ制限・レート制限を必須とする。
// [Phase 3 deprecated] Superseded by ApiKey in api_key.proto.
message ApiKeyConfig {
  option deprecated = true;
  // API キーの一意識別子。
  string id = 1;
  // API キーの表示名（用途の説明）。
  string name = 2;
  // キーのハッシュ（元のキーは作成時のみ返却、保存しない）。SecurityLevel: RESTRICTED。
  string key_hash = 3;
  // キーの有効期限（必須 — 無期限キーは禁止）。
  google.protobuf.Timestamp expires_at = 4;
  // 許可されたスコープ（空 = 全スコープ禁止）。
  repeated string allowed_scopes = 5;
  // 1分あたりのレート制限（0 = デフォルト制限適用）。
  int32 rate_limit_per_minute = 6;
  // キーの所有者（作成者）。
  string owner_id = 7;
  // 最後に使用された日時。
  google.protobuf.Timestamp last_used_at = 8;
  // キーが有効かどうか。
  bool enabled = 9;
  google.protobuf.Timestamp created_at = 10;
}

// LoginRequest はログインリクエストを表す。
// Exposure: EXTERNAL（BFF/Gateway経由）。
message LoginRequest {
  string identifier = 1;
  string password = 2;
  AuthMethod auth_method = 3;
  // クライアントIPアドレス（ゲートウェイが付与）。SecurityLevel: CONFIDENTIAL。
  string ip_address = 4;
  string user_agent = 5;
}

// LoginResponse はログインレスポンスを表す。
message LoginResponse {
  AuthSession session = 1;
}

// LogoutRequest はログアウトリクエストを表す。
// Exposure: EXTERNAL（BFF/Gateway経由）。
message LogoutRequest {
  string session_id = 1;
  bool revoke_all = 2;
}

// LogoutResponse はログアウトレスポンスを表す。
message LogoutResponse {
  int32 revoked_count = 1;
}

// VerifyTokenRequest はトークン検証リクエストを表す。
// Exposure: INTERNAL — サービス間認証でのみ使用。外部クライアントからは呼べない。
message VerifyTokenRequest {
  string access_token = 1;
}

// VerifyTokenResponse はトークン検証レスポンスを表す。
message VerifyTokenResponse {
  bool valid = 1;
  string user_id = 2;
  sirosimes.common.v1.ActorRef actor_ref = 3;
  google.protobuf.Timestamp expires_at = 4;
  repeated string scopes = 5;
  map<string, string> claims = 6;
}

// RefreshTokenRequest はトークンリフレッシュリクエストを表す。
// Exposure: EXTERNAL（BFF/Gateway経由、opaque化）。
message RefreshTokenRequest {
  string refresh_token = 1;
}

// RefreshTokenResponse はトークンリフレッシュレスポンスを表す。
message RefreshTokenResponse {
  AuthSession session = 1;
}

// ListSessionsRequest はセッション一覧取得リクエストを表す。
// Exposure: INTERNAL。
message ListSessionsRequest {
  string user_id = 1;
  SessionStatus status = 2;
}

// ListSessionsResponse はセッション一覧取得レスポンスを表す。
message ListSessionsResponse {
  repeated AuthSession sessions = 1;
}

// RevokeSessionRequest はセッション取り消しリクエストを表す。
// Exposure: INTERNAL。
message RevokeSessionRequest {
  string session_id = 1;
}

// RevokeSessionResponse はセッション取り消しレスポンスを表す。
message RevokeSessionResponse {}

// [Phase 3] CreateApiKeyRequest moved to api_key.proto.

// [Phase 3] CreateApiKeyResponse moved to api_key.proto.

// [Phase 3] RevokeApiKeyRequest moved to api_key.proto.

// [Phase 3] RevokeApiKeyResponse moved to api_key.proto.

// AuthService は瑞垣の認証操作を提供する。
service AuthService {
  // Exposure: EXTERNAL
  rpc Login(LoginRequest) returns (LoginResponse);
  // Exposure: EXTERNAL
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // Exposure: INTERNAL — サービス間認証のみ
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
  // Exposure: EXTERNAL（opaque化必須）
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  // Exposure: INTERNAL
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  // Exposure: INTERNAL
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  // Exposure: INTERNAL — API キーのライフサイクル管理
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse);
  // Exposure: INTERNAL
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse);
}
