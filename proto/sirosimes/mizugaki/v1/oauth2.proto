syntax = "proto3";

package sirosimes.mizugaki.v1;

import "google/protobuf/field_mask.proto";
import "sirosimes/common/v1/actor.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

// oauth2.proto — 瑞垣（Mizugaki）OAuth2 / OIDC クライアント管理。
//
// OIDC Discovery (https://auth.vareal.group/.well-known/openid-configuration) に準拠し、
// Authorization Code Grant、Refresh Token Grant、Client Credentials Grant をサポートする。
// Implicit Grant と ROPC Grant は意図的に未定義（RFC 9207 / OAuth 2.1 draft 準拠）。
//
// Exposure:
//   Authorize, Token, Userinfo → EXTERNAL（公開エンドポイント）
//   RegisterClient〜RotateClientSecret → INTERNAL（管理者操作）
//   TokenIntrospection は token.proto で INTERNAL として定義。
//
// 関連型:
//   - SecurityLevel (common/v1/metadata.proto): client_secret は RESTRICTED レベル。
//   - ResourceMetadata (common/v1/metadata.proto): 標準メタデータ。
//   - TokenClaims (token.proto): OAuth2 トークンに含まれるクレーム。

// GrantType は OAuth2 の認可タイプを分類する。
enum GrantType {
  GRANT_TYPE_UNSPECIFIED = 0;
  // Authorization Code Grant — ユーザー認証を伴うフロー。PKCE必須。
  GRANT_TYPE_AUTHORIZATION_CODE = 1;
  // Refresh Token Grant — トークン更新。
  GRANT_TYPE_REFRESH_TOKEN = 2;
  // Client Credentials Grant — サービス間認証。
  GRANT_TYPE_CLIENT_CREDENTIALS = 3;
  // Implicit Grant: 意図的に未定義（廃止済み、RFC 9207）。
  // ROPC Grant: 意図的に未定義（非推奨、OAuth 2.1 draft）。
}

// ScopeType は許可されたOAuth2スコープの有限集合を定義する。
// 任意文字列スコープの代わりにenum型で管理し、未定義スコープの要求を防止する。
enum ScopeType {
  SCOPE_TYPE_UNSPECIFIED = 0;
  // OpenID Connect core scope.
  SCOPE_TYPE_OPENID = 1;
  // ユーザープロフィール情報（name, picture等）。
  SCOPE_TYPE_PROFILE = 2;
  // メールアドレス。
  SCOPE_TYPE_EMAIL = 3;
  // ロール・権限情報。
  SCOPE_TYPE_ROLES = 4;
  // オフラインアクセス（リフレッシュトークン発行）。
  SCOPE_TYPE_OFFLINE_ACCESS = 5;
}

// ResponseType は OAuth2 の応答タイプを分類する。
enum ResponseType {
  RESPONSE_TYPE_UNSPECIFIED = 0;
  RESPONSE_TYPE_CODE = 1;
}

// TokenEndpointAuthMethod はトークンエンドポイントの認証方法を分類する。
enum TokenEndpointAuthMethod {
  TOKEN_ENDPOINT_AUTH_METHOD_UNSPECIFIED = 0;
  TOKEN_ENDPOINT_AUTH_METHOD_CLIENT_SECRET_POST = 1;
  TOKEN_ENDPOINT_AUTH_METHOD_CLIENT_SECRET_BASIC = 2;
}

// ClientStatus は OAuth2 クライアントの状態を表す。
enum ClientStatus {
  CLIENT_STATUS_UNSPECIFIED = 0;
  CLIENT_STATUS_ACTIVE = 1;
  CLIENT_STATUS_INACTIVE = 2;
  CLIENT_STATUS_SUSPENDED = 3;
}

// OAuth2Client は登録された OAuth2/OIDC クライアントアプリケーションを表す。
message OAuth2Client {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string client_id = 2;
  string client_name = 3;
  string description = 4;
  repeated string redirect_uris = 5;
  repeated GrantType grant_types = 6;
  repeated ResponseType response_types = 7;
  // 許可されたスコープ（enum型で有限集合管理）。
  repeated ScopeType scopes = 8;
  TokenEndpointAuthMethod token_endpoint_auth_method = 9;
  ClientStatus status = 10;
  string client_uri = 11;
  string logo_uri = 12;
  int32 access_token_ttl_seconds = 13;
  int32 refresh_token_ttl_seconds = 14;
}

// RegisterClientRequest は OAuth2 クライアント登録リクエストを表す。
// Exposure: INTERNAL（管理者操作）。
message RegisterClientRequest {
  string client_id = 1;
  string client_name = 2;
  string description = 3;
  repeated string redirect_uris = 4;
  repeated GrantType grant_types = 5;
  repeated ScopeType scopes = 6;
  TokenEndpointAuthMethod token_endpoint_auth_method = 7;
  string client_uri = 8;
  int32 access_token_ttl_seconds = 9;
  int32 refresh_token_ttl_seconds = 10;
}

// RegisterClientResponse は OAuth2 クライアント登録レスポンスを表す。
message RegisterClientResponse {
  OAuth2Client client = 1;
  // クライアントシークレット（RESTRICTED — 登録時のみ返却、以降は取得不可）。
  string client_secret = 2;
}

// GetClientRequest は OAuth2 クライアント取得リクエストを表す。
// Exposure: INTERNAL。
message GetClientRequest {
  string client_id = 1;
}

// GetClientResponse は OAuth2 クライアント取得レスポンスを表す。
message GetClientResponse {
  OAuth2Client client = 1;
}

// UpdateClientRequest は OAuth2 クライアント更新リクエストを表す。
// Exposure: INTERNAL（管理者操作）。
message UpdateClientRequest {
  string client_id = 1;
  string client_name = 2;
  string description = 3;
  repeated string redirect_uris = 4;
  repeated GrantType grant_types = 5;
  repeated ScopeType scopes = 6;
  ClientStatus status = 7;
  int32 access_token_ttl_seconds = 8;
  int32 refresh_token_ttl_seconds = 9;
  // Fields to update. If empty, all non-empty fields are updated.
  google.protobuf.FieldMask update_mask = 10;
}

// UpdateClientResponse は OAuth2 クライアント更新レスポンスを表す。
message UpdateClientResponse {
  OAuth2Client client = 1;
}

// DeleteClientRequest は OAuth2 クライアント削除リクエストを表す。
// Exposure: INTERNAL（管理者操作）。
message DeleteClientRequest {
  string client_id = 1;
}

// DeleteClientResponse は OAuth2 クライアント削除レスポンスを表す。
message DeleteClientResponse {}

// ListClientsRequest は OAuth2 クライアント一覧取得リクエストを表す。
// Exposure: INTERNAL。
message ListClientsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  ClientStatus status = 2;
  string search = 3;
}

// ListClientsResponse は OAuth2 クライアント一覧取得レスポンスを表す。
message ListClientsResponse {
  repeated OAuth2Client clients = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// RotateClientSecretRequest はクライアントシークレットローテーションリクエストを表す。
// Exposure: INTERNAL（管理者操作）。
message RotateClientSecretRequest {
  string client_id = 1;
}

// RotateClientSecretResponse はクライアントシークレットローテーションレスポンスを表す。
message RotateClientSecretResponse {
  // 新しいクライアントシークレット（RESTRICTED — この応答でのみ返却）。
  string client_secret = 1;
}

// AuthorizeRequest は OAuth2 認可リクエストを表す。
// Exposure: EXTERNAL。
message AuthorizeRequest {
  string client_id = 1;
  ResponseType response_type = 2;
  string redirect_uri = 3;
  // 要求するスコープ（スペース区切り文字列 — OAuth2仕様互換）。
  string scope = 4;
  // CSRF対策用ステート値（必須）。
  string state = 5;
  // PKCE code_challenge。
  // ⚠️ PKCE REQUIRED for all grant types using authorization code
  // (RFC 9126 / OAuth 2.1 draft 準拠)。全クライアント（Confidential含む）で必須。
  // code_challenge_method は "S256" のみ許可（"plain" は禁止）。
  string code_challenge = 6;
  // PKCE code_challenge_method（"S256" のみ許可）。
  string code_challenge_method = 7;
}

// AuthorizeResponse は OAuth2 認可レスポンスを表す。
message AuthorizeResponse {
  string code = 1;
  string state = 2;
  string redirect_uri = 3;
}

// TokenRequest は OAuth2 トークンリクエストを表す。
// Exposure: EXTERNAL。
message TokenRequest {
  GrantType grant_type = 1;
  string client_id = 2;
  // SecurityLevel: RESTRICTED。
  string client_secret = 3;
  string code = 4;
  string redirect_uri = 5;
  string refresh_token = 6;
  string scope = 7;
  // PKCE code_verifier（authorization_code grant では必須）。
  string code_verifier = 8;
}

// TokenResponse は OAuth2 トークンレスポンスを表す。
message TokenResponse {
  string access_token = 1;
  string token_type = 2;
  int32 expires_in = 3;
  string refresh_token = 4;
  string scope = 5;
  string id_token = 6;
}

// UserinfoRequest は OIDC UserInfo リクエストを表す。
// Exposure: EXTERNAL。
message UserinfoRequest {
  string access_token = 1;
}

// UserinfoResponse は OIDC UserInfo レスポンスを表す（OIDC Standard Claims準拠）。
message UserinfoResponse {
  string sub = 1;
  string name = 2;
  string email = 3;
  bool email_verified = 4;
  repeated string roles = 5;
  int32 trust_level = 6;
  // アクター種別（enum型で一貫性を保持）。
  sirosimes.common.v1.ActorType actor_type = 7;
  string identifier = 8;
  string picture = 9;
}

// OAuth2Service は OAuth2/OIDC クライアント管理と認可操作を提供する。
service OAuth2Service {
  // Exposure: INTERNAL — 管理者操作
  rpc RegisterClient(RegisterClientRequest) returns (RegisterClientResponse);
  rpc GetClient(GetClientRequest) returns (GetClientResponse);
  rpc UpdateClient(UpdateClientRequest) returns (UpdateClientResponse);
  rpc DeleteClient(DeleteClientRequest) returns (DeleteClientResponse);
  rpc ListClients(ListClientsRequest) returns (ListClientsResponse);
  rpc RotateClientSecret(RotateClientSecretRequest) returns (RotateClientSecretResponse);
  // Exposure: EXTERNAL — 公開エンドポイント
  rpc Authorize(AuthorizeRequest) returns (AuthorizeResponse);
  rpc Token(TokenRequest) returns (TokenResponse);
  rpc Userinfo(UserinfoRequest) returns (UserinfoResponse);
}
