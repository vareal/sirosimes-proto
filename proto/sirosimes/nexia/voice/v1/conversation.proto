syntax = "proto3";

package sirosimes.nexia.voice.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

// conversation.proto — Nexia Voice 音声会話・対話管理。
//
// 音声認識（STT）、音声合成（TTS）、対話管理、
// インテント検出、顧客対応ボイスエージェントを提供する。
// 言霊（Kotodama）の推論エンジンと連携し、高品質な音声対話を実現する。

// ConversationStatus は会話の状態。
enum ConversationStatus {
  CONVERSATION_STATUS_UNSPECIFIED = 0;
  CONVERSATION_STATUS_ACTIVE = 1;
  CONVERSATION_STATUS_PAUSED = 2;
  CONVERSATION_STATUS_COMPLETED = 3;
  CONVERSATION_STATUS_TRANSFERRED = 4;
  CONVERSATION_STATUS_ABANDONED = 5;
}

// SpeechProvider は音声プロバイダ。
enum SpeechProvider {
  SPEECH_PROVIDER_UNSPECIFIED = 0;
  SPEECH_PROVIDER_OPENAI_WHISPER = 1;
  SPEECH_PROVIDER_GOOGLE_STT = 2;
  SPEECH_PROVIDER_EDGE_TTS = 3;
  SPEECH_PROVIDER_ELEVENLABS = 4;
  SPEECH_PROVIDER_LOCAL_VOSK = 5;
}

// Utterance は発話。
message Utterance {
  string id = 1;
  string conversation_id = 2;
  string speaker = 3;
  bool is_bot = 4;
  string text = 5;
  string audio_url = 6;
  google.protobuf.Duration duration = 7;
  float confidence = 8;
  string intent = 9;
  string language = 10;
  google.protobuf.Timestamp timestamp = 11;
}

// Conversation は音声会話。
message Conversation {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string customer_id = 2;
  string agent_id = 3;
  ConversationStatus status = 4;
  string language = 5;
  string channel = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp ended_at = 8;
  google.protobuf.Duration total_duration = 9;
  int32 utterance_count = 10;
  string summary = 11;
  string sentiment = 12;
  float satisfaction_score = 13;
  repeated string tags = 14;
  string recording_url = 15;
}

// VoiceConfig は音声設定。
message VoiceConfig {
  SpeechProvider stt_provider = 1;
  SpeechProvider tts_provider = 2;
  string voice_id = 3;
  float speed = 4;
  float pitch = 5;
  string language = 6;
  bool noise_suppression = 7;
  int32 silence_timeout_ms = 8;
}

// ConversationService は音声会話サービス。
service ConversationService {
  rpc StartConversation(StartConversationRequest) returns (StartConversationResponse);
  rpc EndConversation(EndConversationRequest) returns (EndConversationResponse);
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc ListUtterances(ListUtterancesRequest) returns (ListUtterancesResponse);
  rpc TranscribeAudio(TranscribeAudioRequest) returns (TranscribeAudioResponse);
  rpc SynthesizeSpeech(SynthesizeSpeechRequest) returns (SynthesizeSpeechResponse);
  rpc GetVoiceConfig(GetVoiceConfigRequest) returns (GetVoiceConfigResponse);
  rpc UpdateVoiceConfig(UpdateVoiceConfigRequest) returns (UpdateVoiceConfigResponse);
  rpc GenerateConversationSummary(GenerateConversationSummaryRequest) returns (GenerateConversationSummaryResponse);
}

message StartConversationRequest {
  string customer_id = 1;
  string agent_id = 2;
  string language = 3;
  string channel = 4;
  VoiceConfig voice_config = 5;
}

message StartConversationResponse {
  Conversation conversation = 1;
}

message EndConversationRequest {
  string id = 1;
}

message EndConversationResponse {
  Conversation conversation = 1;
}

message GetConversationRequest {
  string id = 1;
}

message GetConversationResponse {
  Conversation conversation = 1;
}

message ListConversationsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string customer_id = 2;
  string agent_id = 3;
  ConversationStatus status_filter = 4;
  google.protobuf.Timestamp start_after = 5;
  google.protobuf.Timestamp start_before = 6;
}

message ListConversationsResponse {
  repeated Conversation conversations = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message ListUtterancesRequest {
  string conversation_id = 1;
  sirosimes.common.v1.PaginationRequest pagination = 2;
}

message ListUtterancesResponse {
  repeated Utterance utterances = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message TranscribeAudioRequest {
  bytes audio_data = 1;
  string format = 2;
  string language = 3;
  SpeechProvider provider = 4;
}

message TranscribeAudioResponse {
  string text = 1;
  float confidence = 2;
  string language = 3;
}

message SynthesizeSpeechRequest {
  string text = 1;
  string voice_id = 2;
  SpeechProvider provider = 3;
  float speed = 4;
  float pitch = 5;
  string output_format = 6;
}

message SynthesizeSpeechResponse {
  bytes audio_data = 1;
  string content_type = 2;
  int32 duration_ms = 3;
}

message GetVoiceConfigRequest {
  string agent_id = 1;
}

message GetVoiceConfigResponse {
  VoiceConfig config = 1;
}

message UpdateVoiceConfigRequest {
  string agent_id = 1;
  VoiceConfig config = 2;
}

message UpdateVoiceConfigResponse {
  VoiceConfig config = 1;
}

message GenerateConversationSummaryRequest {
  string conversation_id = 1;
}

message GenerateConversationSummaryResponse {
  string summary = 1;
  string sentiment = 2;
  repeated string key_topics = 3;
  repeated string action_items = 4;
}
