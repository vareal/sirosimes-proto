syntax = "proto3";

package sirosimes.nexia.erp.v1;

import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/metadata.proto";
import "sirosimes/common/v1/pagination.proto";

// business.proto — Nexia ERP 業務管理（顧客・請求・在庫）。
//
// 顧客管理（CRM）、請求書管理、在庫管理、営業パイプラインを提供する。
// 天津鏡（Amatsukagami）のビジネス・財務メトリクスとして監視データを提供する。

// CustomerStatus は顧客のステータス。
enum CustomerStatus {
  CUSTOMER_STATUS_UNSPECIFIED = 0;
  CUSTOMER_STATUS_LEAD = 1;
  CUSTOMER_STATUS_PROSPECT = 2;
  CUSTOMER_STATUS_ACTIVE = 3;
  CUSTOMER_STATUS_INACTIVE = 4;
  CUSTOMER_STATUS_CHURNED = 5;
}

// InvoiceStatus は請求書のステータス。
enum InvoiceStatus {
  INVOICE_STATUS_UNSPECIFIED = 0;
  INVOICE_STATUS_DRAFT = 1;
  INVOICE_STATUS_SENT = 2;
  INVOICE_STATUS_PAID = 3;
  INVOICE_STATUS_OVERDUE = 4;
  INVOICE_STATUS_CANCELLED = 5;
  INVOICE_STATUS_REFUNDED = 6;
}

// DealStage は商談ステージ。
enum DealStage {
  DEAL_STAGE_UNSPECIFIED = 0;
  DEAL_STAGE_INITIAL_CONTACT = 1;
  DEAL_STAGE_QUALIFICATION = 2;
  DEAL_STAGE_PROPOSAL = 3;
  DEAL_STAGE_NEGOTIATION = 4;
  DEAL_STAGE_CLOSED_WON = 5;
  DEAL_STAGE_CLOSED_LOST = 6;
}

// Customer は顧客。
message Customer {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string company_name = 2;
  string contact_name = 3;
  string email = 4;
  string phone = 5;
  string address = 6;
  CustomerStatus status = 7;
  string industry = 8;
  string assigned_to = 9;
  repeated string tags = 10;
  string notes = 11;
  int64 lifetime_value = 12;
}

// Invoice は請求書。
message Invoice {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string customer_id = 2;
  string invoice_number = 3;
  InvoiceStatus status = 4;
  repeated InvoiceItem items = 5;
  int64 subtotal = 6;
  int64 tax = 7;
  int64 total = 8;
  string currency = 9;
  google.protobuf.Timestamp issued_at = 10;
  google.protobuf.Timestamp due_at = 11;
  google.protobuf.Timestamp paid_at = 12;
  string notes = 13;
}

// InvoiceItem は請求書明細。
message InvoiceItem {
  string description = 1;
  int32 quantity = 2;
  int64 unit_price = 3;
  int64 amount = 4;
  string tax_rate = 5;
}

// Deal は商談。
message Deal {
  sirosimes.common.v1.ResourceMetadata metadata = 1;
  string customer_id = 2;
  string title = 3;
  DealStage stage = 4;
  int64 amount = 5;
  string currency = 6;
  float probability = 7;
  string assigned_to = 8;
  google.protobuf.Timestamp expected_close_date = 9;
  google.protobuf.Timestamp closed_at = 10;
  string lost_reason = 11;
  string notes = 12;
}

// ERPService はERP業務管理サービス。
service ERPService {
  rpc ListCustomers(ListCustomersRequest) returns (ListCustomersResponse);
  rpc GetCustomer(GetCustomerRequest) returns (GetCustomerResponse);
  rpc CreateCustomer(CreateCustomerRequest) returns (CreateCustomerResponse);
  rpc UpdateCustomer(UpdateCustomerRequest) returns (UpdateCustomerResponse);
  rpc DeleteCustomer(DeleteCustomerRequest) returns (DeleteCustomerResponse);
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);
  rpc GetInvoice(GetInvoiceRequest) returns (GetInvoiceResponse);
  rpc CreateInvoice(CreateInvoiceRequest) returns (CreateInvoiceResponse);
  rpc UpdateInvoiceStatus(UpdateInvoiceStatusRequest) returns (UpdateInvoiceStatusResponse);
  rpc ListDeals(ListDealsRequest) returns (ListDealsResponse);
  rpc GetDeal(GetDealRequest) returns (GetDealResponse);
  rpc CreateDeal(CreateDealRequest) returns (CreateDealResponse);
  rpc UpdateDeal(UpdateDealRequest) returns (UpdateDealResponse);
  rpc GetRevenueStats(GetRevenueStatsRequest) returns (GetRevenueStatsResponse);
}

message ListCustomersRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  CustomerStatus status_filter = 2;
  string search = 3;
  string assigned_to = 4;
}

message ListCustomersResponse {
  repeated Customer customers = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message GetCustomerRequest {
  string id = 1;
}

message GetCustomerResponse {
  Customer customer = 1;
}

message CreateCustomerRequest {
  string company_name = 1;
  string contact_name = 2;
  string email = 3;
  string phone = 4;
  string address = 5;
  string industry = 6;
  string assigned_to = 7;
  repeated string tags = 8;
}

message CreateCustomerResponse {
  Customer customer = 1;
}

message UpdateCustomerRequest {
  string id = 1;
  string contact_name = 2;
  string email = 3;
  string phone = 4;
  string address = 5;
  CustomerStatus status = 6;
  string assigned_to = 7;
  string notes = 8;
}

message UpdateCustomerResponse {
  Customer customer = 1;
}

message DeleteCustomerRequest {
  string id = 1;
}

message DeleteCustomerResponse {}

message ListInvoicesRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string customer_id = 2;
  InvoiceStatus status_filter = 3;
  google.protobuf.Timestamp issued_after = 4;
  google.protobuf.Timestamp issued_before = 5;
}

message ListInvoicesResponse {
  repeated Invoice invoices = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message GetInvoiceRequest {
  string id = 1;
}

message GetInvoiceResponse {
  Invoice invoice = 1;
}

message CreateInvoiceRequest {
  string customer_id = 1;
  repeated InvoiceItem items = 2;
  string currency = 3;
  google.protobuf.Timestamp due_at = 4;
  string notes = 5;
}

message CreateInvoiceResponse {
  Invoice invoice = 1;
}

message UpdateInvoiceStatusRequest {
  string id = 1;
  InvoiceStatus status = 2;
}

message UpdateInvoiceStatusResponse {
  Invoice invoice = 1;
}

message ListDealsRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string customer_id = 2;
  DealStage stage_filter = 3;
  string assigned_to = 4;
}

message ListDealsResponse {
  repeated Deal deals = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

message GetDealRequest {
  string id = 1;
}

message GetDealResponse {
  Deal deal = 1;
}

message CreateDealRequest {
  string customer_id = 1;
  string title = 2;
  int64 amount = 3;
  string currency = 4;
  float probability = 5;
  string assigned_to = 6;
  google.protobuf.Timestamp expected_close_date = 7;
}

message CreateDealResponse {
  Deal deal = 1;
}

message UpdateDealRequest {
  string id = 1;
  DealStage stage = 2;
  int64 amount = 3;
  float probability = 4;
  string assigned_to = 5;
  google.protobuf.Timestamp expected_close_date = 6;
  string lost_reason = 7;
  string notes = 8;
}

message UpdateDealResponse {
  Deal deal = 1;
}

message GetRevenueStatsRequest {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
}

message GetRevenueStatsResponse {
  int64 total_revenue = 1;
  int64 outstanding_amount = 2;
  int64 overdue_amount = 3;
  int32 active_customers = 4;
  int32 active_deals = 5;
  int64 pipeline_value = 6;
  float avg_deal_size = 7;
  float win_rate = 8;
}
