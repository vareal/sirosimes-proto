syntax = "proto3";

package sirosimes.hataori.v1;

import "sirosimes/common/v1/metadata.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/pagination.proto";

// trigger.proto — 機織（Hataori）トリガー管理サービス。
//
// ワークフロー自動起動の条件を定義・管理する。
// Webhook等の外部入力トリガーにはWebhookConfigによる入力検証・レート制限を提供。
//
// Exposure: INTERNAL（全RPC）
// 注意: HandleWebhook RPCは将来External APIとして分離予定（Phase 2）

// TriggerType classifies the event source that initiates a workflow.
enum TriggerType {
  TRIGGER_TYPE_UNSPECIFIED = 0;
  TRIGGER_TYPE_WEBHOOK = 1;
  TRIGGER_TYPE_CRON = 2;
  TRIGGER_TYPE_DB_CHANGE = 3;
  TRIGGER_TYPE_MATTERMOST = 4;
  TRIGGER_TYPE_MANUAL = 5;
  TRIGGER_TYPE_FILE_CHANGE = 6;
  TRIGGER_TYPE_MAIL = 7;
  TRIGGER_TYPE_PUBSUB = 8;
  TRIGGER_TYPE_WEBRTC = 9;
  TRIGGER_TYPE_TSUKASA_EVENT = 10;
  TRIGGER_TYPE_CONTAINER = 11;
  TRIGGER_TYPE_PROCESS = 12;
  TRIGGER_TYPE_VM_EVENT = 13;
  // SecurityEvent連携（sentinel.proto → 機織WFトリガー）。Phase 4追加。
  TRIGGER_TYPE_SECURITY_EVENT = 14;
  // 天守アラート連携（tenshu alert → 機織WFトリガー）。Phase 4追加。
  TRIGGER_TYPE_TENSHU_ALERT = 15;
}

// WebhookConfig provides security configuration for webhook triggers.
// Used when TriggerType is TRIGGER_TYPE_WEBHOOK.
message WebhookConfig {
  // Allowed source IP ranges (CIDR notation). Empty = allow all.
  repeated string allowed_sources = 1;
  // Maximum requests per minute (0 = unlimited).
  int32 rate_limit_per_minute = 2;
  // Enable HMAC signature verification on webhook payloads.
  bool signature_verification = 3;
  // Signature header name (e.g., "X-Hub-Signature-256").
  string signature_header = 4;
  // Shared secret for HMAC signature verification (RESTRICTED).
  string shared_secret = 5;
}

// Trigger defines a condition that automatically starts a workflow.
message Trigger {
  // [Phase 2c deprecated] Use metadata.id. Servers no longer populate this field.
  string id = 1 [deprecated = true];
  string workflow_id = 2;
  TriggerType type = 3;
  string name = 4;
  // Type-specific configuration (e.g., cron expression, filter rules).
  // For WEBHOOK type, use webhook_config instead.
  google.protobuf.Struct config = 5;
  bool enabled = 6;
  // Webhook-specific security configuration.
  // Only populated when type is TRIGGER_TYPE_WEBHOOK.
  WebhookConfig webhook_config = 9;
  // [Phase 2c deprecated] Use metadata.created_at. Servers no longer populate this field.
  google.protobuf.Timestamp created_at = 7 [deprecated = true];
  // [Phase 2c deprecated] Use metadata.updated_at. Servers no longer populate this field.
  google.protobuf.Timestamp updated_at = 8 [deprecated = true];
  // Standard resource metadata. Default security_level: INTERNAL.
  sirosimes.common.v1.ResourceMetadata metadata = 10;
}

// CreateTriggerRequest is the request for creating a new trigger.
message CreateTriggerRequest {
  string workflow_id = 1;
  TriggerType type = 2;
  string name = 3;
  google.protobuf.Struct config = 4;
  bool enabled = 5;
  // Webhook-specific security configuration.
  WebhookConfig webhook_config = 6;
}

// CreateTriggerResponse is the response after creating a trigger.
message CreateTriggerResponse {
  Trigger trigger = 1;
}

// ListTriggersRequest is the request for listing triggers with filters.
message ListTriggersRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  string workflow_id = 2;
  TriggerType type = 3;
  // Filter by enabled state. Use optional to distinguish "filter disabled" from "no filter".
  optional bool enabled = 4;
}

// ListTriggersResponse is the response for listing triggers.
message ListTriggersResponse {
  repeated Trigger triggers = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// GetTriggerRequest is the request for retrieving a single trigger.
message GetTriggerRequest {
  string id = 1;
}

// GetTriggerResponse is the response containing a single trigger.
message GetTriggerResponse {
  Trigger trigger = 1;
}

// UpdateTriggerRequest is the request for updating an existing trigger.
message UpdateTriggerRequest {
  string id = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
  bool enabled = 4;
  // Webhook-specific security configuration.
  WebhookConfig webhook_config = 5;
}

// UpdateTriggerResponse is the response after updating a trigger.
message UpdateTriggerResponse {
  Trigger trigger = 1;
}

// DeleteTriggerRequest is the request for deleting a trigger.
message DeleteTriggerRequest {
  string id = 1;
}

// DeleteTriggerResponse is the response after deleting a trigger.
message DeleteTriggerResponse {}

// HandleWebhookRequest is the request for processing an incoming webhook.
// Exposure: will be EXTERNAL in Phase 2 (after External/Internal directory split).
message HandleWebhookRequest {
  string trigger_id = 1;
  map<string, string> headers = 2;
  bytes body = 3;
}

// HandleWebhookResponse is the response after processing a webhook.
message HandleWebhookResponse {
  string execution_id = 1;
  bool accepted = 2;
}

// TriggerService provides trigger management and webhook handling operations.
// Exposure: INTERNAL — all RPCs are for internal use only.
// Note: HandleWebhook will move to External API in Phase 2.
service TriggerService {
  rpc ListTriggers(ListTriggersRequest) returns (ListTriggersResponse);
  rpc CreateTrigger(CreateTriggerRequest) returns (CreateTriggerResponse);
  rpc GetTrigger(GetTriggerRequest) returns (GetTriggerResponse);
  rpc UpdateTrigger(UpdateTriggerRequest) returns (UpdateTriggerResponse);
  rpc DeleteTrigger(DeleteTriggerRequest) returns (DeleteTriggerResponse);
  rpc HandleWebhook(HandleWebhookRequest) returns (HandleWebhookResponse);
}
