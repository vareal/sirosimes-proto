syntax = "proto3";

package sirosimes.hataori.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/pagination.proto";

// trigger.proto — Trigger management for the Hataori workflow engine.
//
// Triggers define the conditions under which a workflow is automatically
// started. Supports multiple trigger types including webhooks, cron schedules,
// database changes, messaging integrations, and system events.

// TriggerType classifies the event source that initiates a workflow.
enum TriggerType {
  TRIGGER_TYPE_UNSPECIFIED = 0;
  // HTTP webhook callback.
  TRIGGER_TYPE_WEBHOOK = 1;
  // Cron-based scheduled execution.
  TRIGGER_TYPE_CRON = 2;
  // Database change event (CDC).
  TRIGGER_TYPE_DB_CHANGE = 3;
  // Mattermost message or event.
  TRIGGER_TYPE_MATTERMOST = 4;
  // Manual user-initiated trigger.
  TRIGGER_TYPE_MANUAL = 5;
  // File system change event.
  TRIGGER_TYPE_FILE_CHANGE = 6;
  // Incoming email event.
  TRIGGER_TYPE_MAIL = 7;
  // Pub/Sub message event.
  TRIGGER_TYPE_PUBSUB = 8;
  // WebRTC signaling event.
  TRIGGER_TYPE_WEBRTC = 9;
  // Tsukasa platform event (employee, task, wiki changes).
  TRIGGER_TYPE_TSUKASA_EVENT = 10;
  // Container lifecycle event (start, stop, crash).
  TRIGGER_TYPE_CONTAINER = 11;
  // OS process event (start, exit, signal).
  TRIGGER_TYPE_PROCESS = 12;
  // Virtual machine lifecycle event.
  TRIGGER_TYPE_VM_EVENT = 13;
}

// Trigger defines a condition that automatically starts a workflow.
message Trigger {
  // Unique identifier (UUID format).
  string id = 1;
  // Workflow to execute when this trigger fires.
  string workflow_id = 2;
  // Classification of the trigger source.
  TriggerType type = 3;
  // Human-readable trigger name.
  string name = 4;
  // Type-specific configuration (e.g., cron expression, webhook path, filter rules).
  google.protobuf.Struct config = 5;
  // Whether this trigger is currently active.
  bool enabled = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// CreateTriggerRequest is the request for creating a new trigger.
message CreateTriggerRequest {
  string workflow_id = 1;
  TriggerType type = 2;
  string name = 3;
  google.protobuf.Struct config = 4;
  bool enabled = 5;
}

// CreateTriggerResponse is the response after creating a trigger.
message CreateTriggerResponse {
  Trigger trigger = 1;
}

// ListTriggersRequest is the request for listing triggers with filters.
message ListTriggersRequest {
  sirosimes.common.v1.PaginationRequest pagination = 1;
  // Filter by workflow ID.
  string workflow_id = 2;
  // Filter by trigger type.
  TriggerType type = 3;
  // Filter by enabled state.
  bool enabled = 4;
}

// ListTriggersResponse is the response for listing triggers.
message ListTriggersResponse {
  repeated Trigger triggers = 1;
  sirosimes.common.v1.PaginationResponse pagination = 2;
}

// GetTriggerRequest is the request for retrieving a single trigger.
message GetTriggerRequest {
  string id = 1;
}

// GetTriggerResponse is the response containing a single trigger.
message GetTriggerResponse {
  Trigger trigger = 1;
}

// UpdateTriggerRequest is the request for updating an existing trigger.
message UpdateTriggerRequest {
  string id = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
  bool enabled = 4;
}

// UpdateTriggerResponse is the response after updating a trigger.
message UpdateTriggerResponse {
  Trigger trigger = 1;
}

// DeleteTriggerRequest is the request for deleting a trigger.
message DeleteTriggerRequest {
  string id = 1;
}

// DeleteTriggerResponse is the response after deleting a trigger.
message DeleteTriggerResponse {}

// HandleWebhookRequest is the request for processing an incoming webhook.
message HandleWebhookRequest {
  // Trigger ID that this webhook maps to.
  string trigger_id = 1;
  // HTTP headers from the webhook request.
  map<string, string> headers = 2;
  // Raw request body.
  bytes body = 3;
}

// HandleWebhookResponse is the response after processing a webhook.
message HandleWebhookResponse {
  // Execution started by the webhook (if any).
  string execution_id = 1;
  // Whether the webhook was accepted and processed.
  bool accepted = 2;
}

// TriggerService provides trigger management and webhook handling operations.
service TriggerService {
  rpc ListTriggers(ListTriggersRequest) returns (ListTriggersResponse);
  rpc CreateTrigger(CreateTriggerRequest) returns (CreateTriggerResponse);
  rpc GetTrigger(GetTriggerRequest) returns (GetTriggerResponse);
  rpc UpdateTrigger(UpdateTriggerRequest) returns (UpdateTriggerResponse);
  rpc DeleteTrigger(DeleteTriggerRequest) returns (DeleteTriggerResponse);
  rpc HandleWebhook(HandleWebhookRequest) returns (HandleWebhookResponse);
}
