syntax = "proto3";

package sirosimes.hataori.v1;

import "sirosimes/common/v1/metadata.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "sirosimes/common/v1/pagination.proto";

// execution.proto — 機織（Hataori）ワークフロー実行追跡サービス。
//
// ワークフロー実行のライフサイクルと個々のステップを追跡する。
//
// Exposure: INTERNAL（全RPC）

// ExecutionStatus represents the lifecycle state of a workflow execution.
enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_PENDING = 1;
  EXECUTION_STATUS_RUNNING = 2;
  EXECUTION_STATUS_COMPLETED = 3;
  EXECUTION_STATUS_FAILED = 4;
  EXECUTION_STATUS_CANCELLED = 5;
  EXECUTION_STATUS_PAUSED = 6;
}

// ExecutionStepStatus represents the lifecycle state of an individual step.
enum ExecutionStepStatus {
  EXECUTION_STEP_STATUS_UNSPECIFIED = 0;
  EXECUTION_STEP_STATUS_PENDING = 1;
  EXECUTION_STEP_STATUS_RUNNING = 2;
  EXECUTION_STEP_STATUS_COMPLETED = 3;
  EXECUTION_STEP_STATUS_FAILED = 4;
  EXECUTION_STEP_STATUS_SKIPPED = 5;
  EXECUTION_STEP_STATUS_WAITING = 6;
}

// Execution represents a single run of a workflow.
message Execution {
  // [Phase 2c deprecated] Use metadata.id. Servers no longer populate this field.
  string id = 1 [deprecated = true];
  string workflow_id = 2;
  string version_id = 3;
  ExecutionStatus status = 4;
  google.protobuf.Struct input = 5;
  google.protobuf.Struct output = 6;
  string error = 7;
  string triggered_by = 8;
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp finished_at = 10;
  // [Phase 2c deprecated] Use metadata.created_at. Servers no longer populate this field.
  google.protobuf.Timestamp created_at = 11 [deprecated = true];
  // Standard resource metadata. Default security_level: CONFIDENTIAL (may contain sensitive I/O).
  sirosimes.common.v1.ResourceMetadata metadata = 12;
}

// ExecutionStep represents a single step within a workflow execution.
message ExecutionStep {
  string id = 1;
  string execution_id = 2;
  string step_name = 3;
  string step_type = 4;
  ExecutionStepStatus status = 5;
  google.protobuf.Struct input = 6;
  google.protobuf.Struct output = 7;
  string error = 8;
  int32 retries = 9;
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp finished_at = 11;
}

// ListExecutionsRequest is the request for listing executions with filters.
// Uses cursor-based pagination for execution log streams.
message ListExecutionsRequest {
  sirosimes.common.v1.PageToken page_token = 1;
  string workflow_id = 2;
  ExecutionStatus status = 3;
  string triggered_by = 4;
}

// ListExecutionsResponse is the response for listing executions.
message ListExecutionsResponse {
  repeated Execution executions = 1;
  sirosimes.common.v1.PageTokenResponse page_info = 2;
}

// GetExecutionRequest is the request for retrieving a single execution.
message GetExecutionRequest {
  string id = 1;
}

// GetExecutionResponse is the response containing a single execution with its steps.
message GetExecutionResponse {
  Execution execution = 1;
  repeated ExecutionStep steps = 2;
}

// RunWorkflowRequest is the request for starting a new workflow execution.
message RunWorkflowRequest {
  string workflow_id = 1;
  string version_id = 2;
  google.protobuf.Struct input = 3;
  string triggered_by = 4;
}

// RunWorkflowResponse is the response after starting a workflow execution.
message RunWorkflowResponse {
  Execution execution = 1;
}

// CancelExecutionRequest is the request for cancelling a running execution.
message CancelExecutionRequest {
  string id = 1;
  string reason = 2;
}

// CancelExecutionResponse is the response after cancelling an execution.
message CancelExecutionResponse {
  Execution execution = 1;
}

// ResumeExecutionRequest is the request for resuming a paused execution.
message ResumeExecutionRequest {
  string id = 1;
  google.protobuf.Struct input = 2;
}

// ResumeExecutionResponse is the response after resuming an execution.
message ResumeExecutionResponse {
  Execution execution = 1;
}

// ExecutionService provides workflow execution management operations.
// Exposure: INTERNAL — all RPCs are for internal use only.
service ExecutionService {
  rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);
  rpc GetExecution(GetExecutionRequest) returns (GetExecutionResponse);
  rpc RunWorkflow(RunWorkflowRequest) returns (RunWorkflowResponse);
  rpc CancelExecution(CancelExecutionRequest) returns (CancelExecutionResponse);
  rpc ResumeExecution(ResumeExecutionRequest) returns (ResumeExecutionResponse);
}
